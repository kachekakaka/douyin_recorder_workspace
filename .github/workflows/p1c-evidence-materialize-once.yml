name: P1C materialize evidence toolchain once

on:
  push:
    branches: [feature/p1c-interactive-im-evidence-gate]
    paths:
      - .github/workflows/p1c-evidence-materialize-once.yml
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/p1c-evidence-materialize-once.yml

permissions:
  contents: write

concurrency:
  group: p1c-evidence-materialize-once
  cancel-in-progress: false

jobs:
  materialize:
    name: Materialize verified P1C evidence toolchain
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'feature/p1c-interactive-im-evidence-gate'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/p1c-interactive-im-evidence-gate

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify exact staging state
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
          test "$(git rev-parse HEAD^)" = "9544fb5db9411e77693ebd379e554d6a4938c974"
          test "$(git diff --name-only HEAD^ HEAD)" = ".github/workflows/p1c-evidence-materialize-once.yml"

      - name: Reconstruct and verify reviewed source payload
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          payload_b64="$RUNNER_TEMP/p1c-payload.b64"
          payload="$RUNNER_TEMP/p1c-payload.tar.gz"
          : > "$payload_b64"
          for sha in \
            b9343644d2c5e27c6d882b8e993c2caf23396b43 \
            99e975d460f56969c691782ff3349f56ac9574c0 \
            584a7fa7489f18617cf0183b84478bde7a50177f \
            a126d0760b7e8b7ae97f1c097b9d00673ca7ddbb \
            3844146d2eedc0fe1ba3972105c661492326c8ef \
            128b41b0a3eef5f3b595fb64b3d61b80d27ae58a \
            0645c349c2206c5149c7d8724c91f5c4cfa268b0 \
            603ed8195b87ce2441dc76218656328b6435e3aa \
            f36a567da002568b82819747ebdb96adb451a65c \
            14f520b5cc39e2d451f44627729008923291302e \
            0e139fe8bee306b995c9ee7e58449cadc893812c \
            a0c32e5457fc112d3b20779ad5cc1034a36e5c77 \
            8611c1cc214cbf0e2bdf5a539353e1d69c14f410 \
            6d8c160441e24d68aae0ac5b97e698bd1963fb7e \
            f598bfa0ab9639b2ab76c2e658412501271a9941 \
            2f1942acd72af6d7bec38fe9e217f6dd3c09fe9e \
            7e2db7bbcff54d5366f7f391f51207f7d5630a1b \
            d37e2810038e55e41f6814c081b358aa03b558c0 \
            d7c01ae76e767a36098804e95596832e4d05a6bf \
            77a58d265f8618af51572177a660690b7f903840 \
            2785781bee4712cdc298f5bda705e37d8fb4cc51 \
            6a987f4d6ae11abd9eefb0e2d994ec511ce56a5a \
            f526be3b5e78840c1f79dfd11b896a6e3303f7f2 \
            6bd3559dc703b910f917072568eff44af7fe59c1
          do
            gh api "repos/$GITHUB_REPOSITORY/git/blobs/$sha" --jq .content \
              | tr -d '\n' | base64 --decode >> "$payload_b64"
          done
          base64 --decode "$payload_b64" > "$payload"
          echo "aa292a1d2246adef3500216a6950d5c93943b9444ad0bd70a6df4aead9a0c3ae  $payload" \
            | sha256sum -c -

          mapfile -t members < <(tar -tzf "$payload" | sort)
          expected=(
            README.md
            app/douyin/evidence.py
            docs/GITHUB_WORKFLOW.md
            docs/P1C_IMPLEMENTATION_REPORT.md
            docs/protocol/P1C_INTERACTIVE_EVIDENCE_RUNBOOK.md
            tests/unit/test_recipient_evidence.py
            tools/douyin_interactive_evidence.py
            tools/export_recipient_evidence_fixture.py
            tools/verify_source.py
          )
          mapfile -t expected_sorted < <(printf '%s\n' "${expected[@]}" | sort)
          test "${members[*]}" = "${expected_sorted[*]}"
          tar -xzf "$payload"

          while read -r path expected_sha; do
            actual="$(git hash-object "$path")"
            printf '%s %s\n' "$path" "$actual"
            test "$actual" = "$expected_sha"
          done <<'EOF'
          README.md aa5f996fc65c6a2a9532d0bd08abd7fa3d62d267
          app/douyin/evidence.py 522d08109f4b14a02487e76ecc8a4a725acddeff
          docs/GITHUB_WORKFLOW.md 7a86b483562f3011f99b0457daea2cfb9f2f9cb4
          docs/P1C_IMPLEMENTATION_REPORT.md e8289cfc60fcc4cc4b7fde1916c45f9aa98d3be0
          docs/protocol/P1C_INTERACTIVE_EVIDENCE_RUNBOOK.md 24c18c89770460ecc24d59aa1424d5472fd7755f
          tests/unit/test_recipient_evidence.py 62b7e2ddc2729bcf83cc1d92c8bf3456eb0c9836
          tools/douyin_interactive_evidence.py ee3321eafc6134b7a65c3f9c2a0bbcb759ff35da
          tools/export_recipient_evidence_fixture.py c78267e12e8f900dea567bd443c9d3bd084a85e6
          tools/verify_source.py 728e7be0b1afe42327063ec93407b7755bc0f191
          EOF

          rm .github/workflows/p1c-evidence-materialize-once.yml
          python - <<'PY'
          import json
          from pathlib import Path

          contract = json.loads(
              Path("app/douyin/contracts/provisional_v1.json").read_text(encoding="utf-8")
          )
          if contract.get("live_verified") is not False:
              raise SystemExit("live_verified must remain false")
          PY
          git diff --check

      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check

      - name: Run complete source validation
        shell: bash
        run: |
          set -euo pipefail
          python tools/verify_repository_baseline.py
          python tools/verify_source.py
          python -m compileall -q app tests tools
          python -m ruff check --no-cache app tests tools
          python -m pytest -q -p no:cacheprovider --tb=short
          python tools/replay_recipient_fixture.py --quiet
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find web -type f -name '*.js' -print0)

      - name: Install FFmpeg and run supervisor smoke
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          python tools/ffmpeg_supervisor_smoke.py \
            --duration 2 \
            --output-dir "$RUNNER_TEMP/p1c-ffmpeg-smoke"

      - name: Commit and push verified P1C implementation
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin feature/p1c-interactive-im-evidence-gate
          test "$(git rev-parse origin/feature/p1c-interactive-im-evidence-gate)" = "${{ github.event.pull_request.head.sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- \
            .github/workflows/p1c-evidence-materialize-once.yml \
            README.md \
            app/douyin/evidence.py \
            docs/GITHUB_WORKFLOW.md \
            docs/P1C_IMPLEMENTATION_REPORT.md \
            docs/protocol/P1C_INTERACTIVE_EVIDENCE_RUNBOOK.md \
            tests/unit/test_recipient_evidence.py \
            tools/douyin_interactive_evidence.py \
            tools/export_recipient_evidence_fixture.py \
            tools/verify_source.py
          python - <<'PY'
          import subprocess

          actual = set(
              subprocess.check_output(
                  ["git", "diff", "--cached", "--name-only"], text=True
              ).splitlines()
          )
          expected = {
              ".github/workflows/p1c-evidence-materialize-once.yml",
              "README.md",
              "app/douyin/evidence.py",
              "docs/GITHUB_WORKFLOW.md",
              "docs/P1C_IMPLEMENTATION_REPORT.md",
              "docs/protocol/P1C_INTERACTIVE_EVIDENCE_RUNBOOK.md",
              "tests/unit/test_recipient_evidence.py",
              "tools/douyin_interactive_evidence.py",
              "tools/export_recipient_evidence_fixture.py",
              "tools/verify_source.py",
          }
          if actual != expected:
              raise SystemExit(
                  f"staged path mismatch: missing={sorted(expected-actual)} "
                  f"unexpected={sorted(actual-expected)}"
              )
          PY
          git diff --cached --check
          git status --short
          git commit -m "feat: add private interactive Douyin IM evidence gate"
          git push origin "HEAD:feature/p1c-interactive-im-evidence-gate"
          git rev-parse HEAD
