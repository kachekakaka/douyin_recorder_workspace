name: P1B publish recipient core once

on:
  push:
    branches: [feature/p1b-single-room-recipient-foundation]
    paths:
      - .github/workflows/p1b-recipient-core-publish-once.yml

permissions:
  contents: write

concurrency:
  group: p1b-recipient-core-publish-once
  cancel-in-progress: false

jobs:
  publish:
    name: Publish verified recipient transaction core
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/p1b-single-room-recipient-foundation

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock

      - name: Materialize and verify reviewed recipient core
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test "$(git rev-parse HEAD^)" = "e6ac77d7b58700a277c3af30af9d638098f1f875"
          test "$(git diff --name-only HEAD^ HEAD)" = ".github/workflows/p1b-recipient-core-publish-once.yml"

          payload="$RUNNER_TEMP/p1b-recipient-core.tar.gz"
          gh api "repos/$GITHUB_REPOSITORY/git/blobs/a78ed97b0d4ab674feff47071732ed657d48ccde" \
            --jq .content | tr -d '\n' | base64 --decode > "$payload"
          echo "7586cd1ebec8171ef60ebcac183e292db30a0de26b8b32260e378578c7399977  $payload" \
            | sha256sum -c -
          test "$(tar -tzf "$payload" | sort)" = "$(printf '%s\n' \
            app/sessions/__init__.py \
            app/sessions/models.py \
            app/sessions/repository.py \
            app/sessions/service.py \
            tests/unit/test_recipient_session_repository.py | sort)"
          tar -xzf "$payload"

          while read -r path expected; do
            actual="$(git hash-object "$path")"
            test "$actual" = "$expected" || {
              echo "blob mismatch: $path expected=$expected actual=$actual" >&2
              exit 1
            }
          done <<'EOF'
          app/sessions/__init__.py 247127918b993cbdf0b6eef4dd0b404c30f6b1d7
          app/sessions/models.py 577a8c1a81ddd4dc49f645968a69d7c179e8118d
          app/sessions/repository.py 8fe63fa916e90c5111552a41310adfee25b30247
          app/sessions/service.py f9157ae2bc4f3973e8658924c0b756573890fcb4
          tests/unit/test_recipient_session_repository.py 8136f570b514cb8e4c266c3f19df6ada7d20177f
          EOF

          rm .github/workflows/p1b-recipient-core-publish-once.yml
          git diff --check

      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check

      - name: Run complete source validation
        shell: bash
        run: |
          set -euo pipefail
          python tools/verify_repository_baseline.py
          python tools/verify_source.py
          python -m compileall -q app tests tools
          python -m ruff check --no-cache app tests tools
          python -m pytest -q -p no:cacheprovider --tb=short
          python tools/replay_recipient_fixture.py --quiet
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find web -type f -name '*.js' -print0)

      - name: Install FFmpeg and run supervisor smoke
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          python tools/ffmpeg_supervisor_smoke.py \
            --duration 2 \
            --output-dir "$RUNNER_TEMP/p1b-recipient-core-smoke"

      - name: Commit and push verified recipient core
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin feature/p1b-single-room-recipient-foundation
          test "$(git rev-parse origin/feature/p1b-single-room-recipient-foundation)" = "$GITHUB_SHA"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- \
            .github/workflows/p1b-recipient-core-publish-once.yml \
            app/sessions/__init__.py \
            app/sessions/models.py \
            app/sessions/repository.py \
            app/sessions/service.py \
            tests/unit/test_recipient_session_repository.py
          test "$(git diff --cached --name-only | wc -l)" -eq 6
          git diff --cached --check
          git commit -m "feat: persist recipient events and strict timeline transactions"
          test -z "$(git status --short)"
          git push origin "HEAD:feature/p1b-single-room-recipient-foundation"
          git rev-parse HEAD

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: p1b-recipient-core-diagnostics-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/p1b-recipient-core-smoke/ffmpeg.log
          if-no-files-found: ignore
          retention-days: 3
