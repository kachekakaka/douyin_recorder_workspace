# Temporary verified source-transfer workflow; the job removes its refs after promotion.
name: P1A review transfer

on:
  push:
    branches:
      - agent/p1a-review-transfer-20260719-0439

permissions:
  contents: write
  issues: read

concurrency:
  group: p1a-review-transfer-20260719-0439
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TARGET_BRANCH: feature/p1a-single-room-media-foundation
      TRANSFER_BRANCH: agent/p1a-review-transfer-20260719-0439
      STAGING_BRANCH: agent/p1a-review-final-20260719-0439
      EXPECTED_HEAD: 3b9c57e701eadd5f1d44e605056bf5a07bc36662
      EXPECTED_TREE: e159824017fa94e59fddcadb0475232ee660359c
      REVIEW_SHA256: 8b2ae98dfe0dc3ee231fbe59200d9b6286feb5ac0d7e53b8fadb60779388e6d9
      FOLLOWUP_SHA256: ade0789260af9e1726aafeab81f57398ae544c29e98c5fd706784d0ed8dc8ebc
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch and verify patch payloads
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, gzip, hashlib, json, os, re, urllib.request
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/3/comments?per_page=100",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "douyin-recorder-p1a-review-transfer",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              comments = json.load(response)

          review_re = re.compile(
              r"^<!-- P1A_REVIEW_PATCH sha256=([0-9a-f]{64}) encoding=gzip\+base64 -->\n"
              r"([A-Za-z0-9+/=]+)\s*$"
          )
          follow_re = re.compile(
              r"^<!-- P1A_FOLLOWUP_PATCH part=(\d+) total=(\d+) sha256=([0-9a-f]{64}) "
              r"encoding=gzip\+base64 -->\n([A-Za-z0-9+/=]+)\s*$"
          )
          review_sha = os.environ["REVIEW_SHA256"]
          follow_sha = os.environ["FOLLOWUP_SHA256"]
          reviews = []
          parts = {}
          totals = set()
          markers = set()
          for item in comments:
              body = item.get("body") if isinstance(item, dict) else None
              if not isinstance(body, str):
                  continue
              match = review_re.fullmatch(body)
              if match and match.group(1) == review_sha:
                  reviews.append(match.group(2))
                  continue
              match = follow_re.fullmatch(body)
              if match:
                  parts[int(match.group(1))] = match.group(4)
                  totals.add(int(match.group(2)))
                  markers.add(match.group(3))
          if len(reviews) != 1:
              raise SystemExit(f"expected one review payload, found {len(reviews)}")
          if totals != {2} or markers != {follow_sha} or sorted(parts) != [1, 2]:
              raise SystemExit("follow-up payload metadata mismatch")

          review = gzip.decompress(base64.b64decode(reviews[0], validate=True))
          follow = gzip.decompress(base64.b64decode(parts[1] + parts[2], validate=True))
          if hashlib.sha256(review).hexdigest() != review_sha:
              raise SystemExit("review checksum mismatch")
          if hashlib.sha256(follow).hexdigest() != follow_sha:
              raise SystemExit("follow-up checksum mismatch")
          Path("/tmp/p1a-review.patch").write_bytes(review)
          Path("/tmp/p1a-followup.patch").write_bytes(follow)
          print(f"review={len(review)} followup={len(follow)}")
          PY

      - name: Create exact final tree on staging ref
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "$TARGET_BRANCH"
          test "$(git rev-parse "origin/$TARGET_BRANCH")" = "$EXPECTED_HEAD"
          git checkout --detach "$EXPECTED_HEAD"
          git apply --whitespace=nowarn /tmp/p1a-review.patch
          git apply --whitespace=nowarn /tmp/p1a-followup.patch
          git diff --check
          cat > /tmp/expected-files.txt <<'EOF'
          README.md
          app/api/rooms.py
          app/douyin/live_page.py
          app/main.py
          app/media/ffmpeg.py
          app/rooms/models.py
          app/rooms/repository.py
          app/security.py
          docs/P1A_IMPLEMENTATION_PLAN.md
          tests/integration/test_app.py
          tests/integration/test_room_api.py
          tests/unit/test_ffmpeg_supervisor.py
          tests/unit/test_live_page.py
          tests/unit/test_rooms.py
          tools/verify_repository_baseline.py
          tools/verify_source.py
          EOF
          git diff --name-only | LC_ALL=C sort > /tmp/actual-files.txt
          diff -u /tmp/expected-files.txt /tmp/actual-files.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          test "$(git write-tree)" = "$EXPECTED_TREE"
          git commit -m "完成 P1A 安全边界与媒体基础审查修复"
          final_sha="$(git rev-parse HEAD)"
          test "$(git rev-parse HEAD^)" = "$EXPECTED_HEAD"
          test "$(git rev-parse HEAD^{tree})" = "$EXPECTED_TREE"
          git push origin "$final_sha:refs/heads/$STAGING_BRANCH"
          printf 'final_sha=%s\n' "$final_sha" | tee "$RUNNER_TEMP/p1a-final-sha.txt"

      - name: Remove temporary refs after target promotion
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          final_sha="$(cut -d= -f2 "$RUNNER_TEMP/p1a-final-sha.txt")"
          for _ in $(seq 1 150); do
            target_sha="$(git ls-remote origin "refs/heads/$TARGET_BRANCH" | awk '{print $1}')"
            if [[ "$target_sha" == "$final_sha" ]]; then
              git push origin --delete "$STAGING_BRANCH" "$TRANSFER_BRANCH"
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p1a-review-transfer-${{ github.run_attempt }}
          path: ${{ runner.temp }}/p1a-final-sha.txt
          if-no-files-found: warn
          retention-days: 3
