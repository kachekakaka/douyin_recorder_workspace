name: P4A fix Windows concat paths once

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/p4a-windows-concat-fix-once.yml

permissions:
  contents: write

concurrency:
  group: p4a-windows-concat-fix-once
  cancel-in-progress: false

jobs:
  fix:
    name: Apply verified Windows concat path fix
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'feature/p4a-release-packaging'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/p4a-release-packaging

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock

      - name: Verify exact staging head
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
          test "$(git rev-parse HEAD^)" = "753e22e3465087bf10a1faebdceb243b443ec187"
          test "$(git diff --name-only HEAD^ HEAD)" = ".github/workflows/p4a-windows-concat-fix-once.yml"

      - name: Apply relative concat path handling
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          executor = Path("app/postprocess/executor.py")
          text = executor.read_text(encoding="utf-8")
          old_call = "self._ffconcat_path(path)"
          new_call = "self._ffconcat_path(path, base_dir=work_dir)"
          old_helper = r'''    @staticmethod
              def _ffconcat_path(path: Path) -> str:
                  value = path.as_posix()
                  if "'" in value or "\n" in value or "\r" in value:
                      raise PostprocessExecutionError("源媒体路径不能安全写入 concat 清单")
                  return value
          '''
          new_helper = r'''    @staticmethod
              def _ffconcat_path(path: Path, *, base_dir: Path) -> str:
                  try:
                      value = Path(os.path.relpath(path, start=base_dir)).as_posix()
                  except ValueError:
                      value = path.as_uri()
                  if "'" in value or "\n" in value or "\r" in value:
                      raise PostprocessExecutionError("源媒体路径不能安全写入 concat 清单")
                  return value
          '''
          if text.count(old_call) != 1 or old_helper not in text:
              raise SystemExit("expected concat implementation syntax was not found")
          executor.write_text(
              text.replace(old_call, new_call, 1).replace(old_helper, new_helper, 1),
              encoding="utf-8",
          )

          tests = Path("tests/unit/test_postprocess.py")
          test_text = tests.read_text(encoding="utf-8")
          marker = "def test_ffmpeg_postprocess_can_adopt_atomic_existing_output_on_retry(\n"
          addition = '''def test_ffmpeg_postprocess_concat_paths_are_relative_with_uri_fallback(
              tmp_path: Path, monkeypatch: pytest.MonkeyPatch
          ) -> None:
              source = (
                  tmp_path / "records" / "room" / "session" / "media" / "00000.mkv"
              )
              source.parent.mkdir(parents=True)
              source.write_bytes(b"media")
              work_dir = (
                  tmp_path
                  / "userdata"
                  / "postprocess-work"
                  / "attempt"
                  / "interval-1"
              )
              work_dir.mkdir(parents=True)
              relative = FFmpegPostprocessExecutor._ffconcat_path(
                  source, base_dir=work_dir
              )
              assert relative == "../../../../records/room/session/media/00000.mkv"

              def fail_relpath(*_args: object, **_kwargs: object) -> str:
                  raise ValueError

              monkeypatch.setattr(
                  "app.postprocess.executor.os.path.relpath", fail_relpath
              )
              assert FFmpegPostprocessExecutor._ffconcat_path(
                  source, base_dir=work_dir
              ) == source.as_uri()


          '''
          if marker not in test_text:
              raise SystemExit("test insertion marker was not found")
          tests.write_text(test_text.replace(marker, addition + marker, 1), encoding="utf-8")
          PY
          git diff --check
          test "$(git diff --name-only | sort)" = "$(printf '%s\n' app/postprocess/executor.py tests/unit/test_postprocess.py | sort)"

      - name: Run complete validation
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check
          python tools/verify_repository_baseline.py
          python tools/verify_source.py
          python -m compileall -q app tests tools
          python -m ruff check --no-cache app tests tools
          python -m pytest -q -p no:cacheprovider --tb=short
          python tools/release_package.py validate-lock
          python tools/replay_recipient_fixture.py --quiet
          python tools/replay_recipient_fixture_to_db.py --output "$RUNNER_TEMP/recipient-db.json"

      - name: Commit and push business fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/postprocess/executor.py tests/unit/test_postprocess.py
          test "$(git diff --cached --name-only | sort)" = "$(printf '%s\n' app/postprocess/executor.py tests/unit/test_postprocess.py | sort)"
          git commit -m "fix: use portable FFconcat source paths"
          git push origin "HEAD:feature/p4a-release-packaging"
          git rev-parse HEAD
