name: P1D materialize recording session once

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/p1d-recording-materialize-once.yml

permissions:
  contents: write

concurrency:
  group: p1d-recording-materialize-once
  cancel-in-progress: false

jobs:
  materialize:
    name: Materialize verified P1D recording session
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'feature/p1d-single-room-recording-session'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/p1d-single-room-recording-session

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify exact staging state
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
          test "$(git rev-parse HEAD^)" = "72ccc439cd62d5af223c59507e64349e1825851a"
          test "$(git diff --name-only HEAD^ HEAD)" = ".github/workflows/p1d-recording-materialize-once.yml"

      - name: Reconstruct and verify reviewed P1D payload
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          payload_b64="$RUNNER_TEMP/p1d-payload.b64"
          payload="$RUNNER_TEMP/p1d-payload.tar.gz"
          : > "$payload_b64"
          for sha in \
            93e865c94cd20e50d70b2ad5ad5cdfda1ec4536e \
            203a2514b3e7663432a142ef4913a1926eadd6d5 \
            ed041fd5299ea9f9c7261a1fd6c202f72f2ac2ff \
            26853115c2746c941bb512a55a8937859f02cf5e \
            7bf74e65c3a63419851f3b9da243cad10b176e50 \
            8fff602e642e36df640aed1e5fe826af64ff4249 \
            908d2c6c9884ff78029f0e2ac5c760ac88c7ccf4 \
            89cf56b494cdadd2f3cdbf69069d3fa1acace9d2 \
            4064fe4e80503c03f5ae89a8fd5d6d04c4a34ba4 \
            612f229b4b2995eea0b61542fe7a34b18c27eb8e \
            1b9db7f18bd731c7569c77b2203604754752c8cc
          do
            gh api "repos/$GITHUB_REPOSITORY/git/blobs/$sha" --jq .content \
              | tr -d '\n' | base64 --decode >> "$payload_b64"
          done
          base64 --decode "$payload_b64" > "$payload"
          echo "66a3494f80de8280b09619972b400cb31886c61f325a575ca0cd9a9adf3bde8e  $payload" | sha256sum -c -
          test "$(stat -c %s "$payload")" = "51837"

          mapfile -t members < <(tar -tzf "$payload" | sort)
          expected=(
            .github/workflows/ci.yml
            README.md
            app/api/__init__.py
            app/api/recording.py
            app/api/rooms.py
            app/db/migrations/__init__.py
            app/main.py
            app/media/ffmpeg.py
            app/recording/__init__.py
            app/recording/models.py
            app/recording/repository.py
            app/recording/service.py
            app/sessions/_write_store.py
            app/state.py
            docs/GITHUB_WORKFLOW.md
            docs/P1D_IMPLEMENTATION_PLAN.md
            docs/P1D_IMPLEMENTATION_REPORT.md
            tests/integration/test_app.py
            tests/integration/test_recording_api.py
            tests/integration/test_room_api.py
            tests/unit/test_database_and_settings.py
            tests/unit/test_ffmpeg_supervisor.py
            tests/unit/test_recipient_database_replay.py
            tests/unit/test_recording_session_service.py
            tests/unit/test_rooms.py
            tools/recording_session_smoke.py
            verify.bat
            web/assets/css/app.css
            web/assets/js/api.js
            web/assets/js/app.js
            web/index.html
          )
          mapfile -t expected_sorted < <(printf '%s\n' "${expected[@]}" | sort)
          test "${members[*]}" = "${expected_sorted[*]}"
          tar -xzf "$payload"

          while read -r path expected_sha; do
            actual="$(git hash-object "$path")"
            printf '%s %s\n' "$path" "$actual"
            test "$actual" = "$expected_sha"
          done <<'EOF'
          .github/workflows/ci.yml 68773885f7c492875e3979310191f7bbac84c272
          README.md 63495c8fa3fb5de805d0054898b68435f915c2e5
          app/api/__init__.py 8a705fdebd7e049d90b511dc07470f3f04c2c94d
          app/api/recording.py 8a1ccbdc67852b58965a89df5b8ec947152b838b
          app/api/rooms.py fef79b534f2a8e02bc9e564783eaa124650211fb
          app/db/migrations/__init__.py 48c77998b5f666ed8163ead7aa341cf42f68dd8a
          app/main.py 567b1bf681841d54a6978fb7444ebe4eb43b7001
          app/media/ffmpeg.py 93871b6a542fb97f832fae7dc3d3767b8dc6550b
          app/recording/__init__.py 56135efb0e94ebc806e624d5d4d7640c0a3f8e15
          app/recording/models.py 58220591879ba3aa39b23650ec43fc4d74027197
          app/recording/repository.py 7124f2683fcfef5eba001cf3be0ed4845c02496a
          app/recording/service.py 30a74e1271a6ba3e645959052209966eca5ab93a
          app/sessions/_write_store.py 2b398f1d62dbb42cf92ea441cde0667b9b507adc
          app/state.py 0374dc4dd927594c8ec1bce783719e7d3f97ed32
          docs/GITHUB_WORKFLOW.md 723864daafe9c65713c613d989a010b39429e24e
          docs/P1D_IMPLEMENTATION_PLAN.md 4af4339b5a891c36cde78cf7243c7784d3c3f775
          docs/P1D_IMPLEMENTATION_REPORT.md db72953b793ba585c22ac054fb1c5d5bdf439dea
          tests/integration/test_app.py 4058a42d37fb27f4db3708daecb5ce9d56c3e3d2
          tests/integration/test_recording_api.py 3614f431d5673537d38fcfc4211edf5c534a4063
          tests/integration/test_room_api.py 9db3f649cf0754132a4f2fd250eba169e1f1b280
          tests/unit/test_database_and_settings.py a556020a87a9469921b9a642e5310b3576e56795
          tests/unit/test_ffmpeg_supervisor.py 1676e26c54fec4b781d12e105e7f7ad5434734ec
          tests/unit/test_recipient_database_replay.py b16dbf1a2cd8d003aeb6a6f4b31408a95463d3ea
          tests/unit/test_recording_session_service.py 1971ef5b0abee38a39dc258e60ceb4657c1ca34b
          tests/unit/test_rooms.py fd32e5a8474573bd8dac829f08a3fc596adeb391
          tools/recording_session_smoke.py deff3d0d6907e98fe9000dc82e9d9f34ec80da29
          verify.bat e662cc3bd2261c275653887e8350e8e8d37727a6
          web/assets/css/app.css 0b85721f0a61717dbbf42a3895f063e91a49ad2a
          web/assets/js/api.js 8e3136f9b1d90f96ec2450f13f8e25312f3f0b66
          web/assets/js/app.js b483df1b08494c498f44b1546c40479cc9bb924b
          web/index.html 730a7d239089adb4e08fc17b8aefae8a70e01e04
          EOF

          python - <<'PY2'
          import json
          from pathlib import Path
          contract = json.loads(
              Path("app/douyin/contracts/provisional_v1.json").read_text(encoding="utf-8")
          )
          if contract.get("live_verified") is not False:
              raise SystemExit("live_verified must remain false")
          PY2
          git diff --check

      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check

      - name: Run complete P1D source validation
        shell: bash
        run: |
          set -euo pipefail
          python tools/verify_repository_baseline.py
          python tools/verify_source.py
          python -m compileall -q app tests tools
          python -m ruff check --no-cache app tests tools
          python -m pytest -q -p no:cacheprovider --tb=short
          python tools/replay_recipient_fixture.py --quiet
          python tools/replay_recipient_fixture_to_db.py \
            --output "$RUNNER_TEMP/recipient-database-replay.json"
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find web -type f -name '*.js' -print0)

      - name: Install FFmpeg and run P1D smoke tests
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          python tools/ffmpeg_supervisor_smoke.py \
            --duration 2 \
            --output-dir "$RUNNER_TEMP/p1d-ffmpeg-supervisor-smoke"
          python tools/recording_session_smoke.py \
            --duration 2 \
            --output-dir "$RUNNER_TEMP/p1d-recording-session-smoke"

      - name: Stage exact verified P1D tree
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/p1d-recording-materialize-once.yml
          git add -- \
            .github/workflows/ci.yml \
            README.md \
            app/api/__init__.py \
            app/api/recording.py \
            app/api/rooms.py \
            app/db/migrations/__init__.py \
            app/main.py \
            app/media/ffmpeg.py \
            app/recording/__init__.py \
            app/recording/models.py \
            app/recording/repository.py \
            app/recording/service.py \
            app/sessions/_write_store.py \
            app/state.py \
            docs/GITHUB_WORKFLOW.md \
            docs/P1D_IMPLEMENTATION_PLAN.md \
            docs/P1D_IMPLEMENTATION_REPORT.md \
            tests/integration/test_app.py \
            tests/integration/test_recording_api.py \
            tests/integration/test_room_api.py \
            tests/unit/test_database_and_settings.py \
            tests/unit/test_ffmpeg_supervisor.py \
            tests/unit/test_recipient_database_replay.py \
            tests/unit/test_recording_session_service.py \
            tests/unit/test_rooms.py \
            tools/recording_session_smoke.py \
            verify.bat \
            web/assets/css/app.css \
            web/assets/js/api.js \
            web/assets/js/app.js \
            web/index.html
          git add -u -- .github/workflows/p1d-recording-materialize-once.yml
          git diff --cached --name-status
          git diff --cached --check
          git write-tree

      - name: Commit verified P1D implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: complete P1D single-room recording session"
          test -z "$(git status --short)"
          git rev-parse HEAD

      - name: Push verified P1D implementation
        shell: bash
        run: |
          set -euo pipefail
          git push origin "HEAD:feature/p1d-single-room-recording-session"
          git rev-parse HEAD
