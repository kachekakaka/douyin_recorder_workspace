name: P1A source bootstrap

on:
  workflow_dispatch:
  push:
    branches: [feature/p1a-single-room-media-foundation]
    paths:
      - .github/workflows/p1a-bootstrap.yml
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/p1a-bootstrap.yml

permissions:
  contents: write
  issues: read

concurrency:
  group: p1a-source-bootstrap
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout P1A branch
        uses: actions/checkout@v4
        with:
          ref: feature/p1a-single-room-media-foundation
          fetch-depth: 0

      - name: Fetch verified source payload and apply
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import base64
          import hashlib
          import io
          import json
          import os
          import re
          import tarfile
          import urllib.request
          from pathlib import Path

          repository = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repository}/issues/3/comments?per_page=100",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "douyin-recorder-p1a-bootstrap",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              comments = json.load(response)

          pattern = re.compile(
              r"^<!-- P1A_BOOTSTRAP_PAYLOAD part=(\d+) total=(\d+) "
              r"sha256=([0-9a-f]{64}) -->\n([A-Za-z0-9+/=]+)\s*$"
          )
          parts: dict[int, str] = {}
          expected_total: int | None = None
          expected_sha256: str | None = None
          for item in comments:
              body = item.get("body") if isinstance(item, dict) else None
              if not isinstance(body, str):
                  continue
              match = pattern.fullmatch(body)
              if match is None:
                  continue
              part = int(match.group(1))
              total = int(match.group(2))
              digest = match.group(3)
              if expected_total not in (None, total) or expected_sha256 not in (None, digest):
                  raise SystemExit("payload metadata is inconsistent")
              expected_total = total
              expected_sha256 = digest
              parts[part] = match.group(4)

          if expected_total != 4 or sorted(parts) != [1, 2, 3, 4]:
              raise SystemExit(f"expected four payload parts, received {sorted(parts)}")
          raw = base64.b64decode("".join(parts[index] for index in range(1, 5)), validate=True)
          actual_sha256 = hashlib.sha256(raw).hexdigest()
          if actual_sha256 != expected_sha256:
              raise SystemExit(
                  f"payload checksum mismatch: {actual_sha256} != {expected_sha256}"
              )

          root = Path.cwd().resolve()
          with tarfile.open(fileobj=io.BytesIO(raw), mode="r:gz") as archive:
              members = archive.getmembers()
              if not members:
                  raise SystemExit("payload archive is empty")
              for member in members:
                  relative = Path(member.name)
                  if (
                      relative.is_absolute()
                      or ".." in relative.parts
                      or member.issym()
                      or member.islnk()
                      or tuple(relative.parts[:2]) == (".github", "workflows")
                  ):
                      raise SystemExit(f"unsafe payload member: {member.name}")
                  if not member.isfile():
                      continue
                  target = (root / relative).resolve()
                  target.relative_to(root)
                  source = archive.extractfile(member)
                  if source is None:
                      raise SystemExit(f"cannot read payload member: {member.name}")
                  target.parent.mkdir(parents=True, exist_ok=True)
                  target.write_bytes(source.read())

          print(f"Applied {sum(1 for item in members if item.isfile())} files")
          print(f"Payload SHA-256: {actual_sha256}")
          PY

          git diff --check
          git status --short
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: implement P1A single-room media foundation"
          git push origin HEAD:feature/p1a-single-room-media-foundation
