name: P1D materialize recording retry once

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/p1d-recording-retry-once.yml

permissions:
  contents: write

concurrency:
  group: p1d-recording-retry-once
  cancel-in-progress: false

jobs:
  materialize:
    name: Materialize reviewed P1D recording payload
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'feature/p1d-single-room-recording-session'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/p1d-single-room-recording-session

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify retry staging commit
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
          test "$(git rev-parse HEAD^)" = "f27443eddebe397a7539fe2ddf4e839186b24409"
          test "$(git diff --name-only HEAD^ HEAD)" = ".github/workflows/p1d-recording-retry-once.yml"

      - name: Restore reviewed payload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          b64="$RUNNER_TEMP/p1d.b64"
          archive="$RUNNER_TEMP/p1d.tar.gz"
          : > "$b64"
          for sha in \
            93e865c94cd20e50d70b2ad5ad5cdfda1ec4536e \
            203a2514b3e7663432a142ef4913a1926eadd6d5 \
            ed041fd5299ea9f9c7261a1fd6c202f72f2ac2ff \
            26853115c2746c941bb512a55a8937859f02cf5e \
            7bf74e65c3a63419851f3b9da243cad10b176e50 \
            8fff602e642e36df640aed1e5fe826af64ff4249 \
            908d2c6c9884ff78029f0e2ac5c760ac88c7ccf4 \
            89cf56b494cdadd2f3cdbf69069d3fa1acace9d2 \
            4064fe4e80503c03f5ae89a8fd5d6d04c4a34ba4 \
            612f229b4b2995eea0b61542fe7a34b18c27eb8e \
            1b9db7f18bd731c7569c77b2203604754752c8cc
          do
            gh api "repos/$GITHUB_REPOSITORY/git/blobs/$sha" --jq .content \
              | tr -d '\n' | base64 --decode >> "$b64"
          done
          base64 --decode "$b64" > "$archive"
          echo "66a3494f80de8280b09619972b400cb31886c61f325a575ca0cd9a9adf3bde8e  $archive" \
            | sha256sum -c -
          test "$(stat -c %s "$archive")" = "51837"
          test "$(tar -tzf "$archive" | wc -l)" = "31"
          tar -xzf "$archive"
          python - <<'PY'
          import json
          from pathlib import Path
          contract = json.loads(
              Path("app/douyin/contracts/provisional_v1.json").read_text(encoding="utf-8")
          )
          if contract.get("live_verified") is not False:
              raise SystemExit("live_verified must remain false")
          PY
          git diff --check

      - name: Run complete validation
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check
          python tools/verify_repository_baseline.py
          python tools/verify_source.py
          python -m compileall -q app tests tools
          python -m ruff check --no-cache app tests tools
          python -m pytest -q -p no:cacheprovider --tb=short
          python tools/replay_recipient_fixture.py --quiet
          python tools/replay_recipient_fixture_to_db.py \
            --output "$RUNNER_TEMP/recipient-db-replay.json"
          while IFS= read -r -d '' file; do node --check "$file"; done \
            < <(find web -type f -name '*.js' -print0)

      - name: Run FFmpeg session smokes
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          python tools/ffmpeg_supervisor_smoke.py \
            --duration 2 --output-dir "$RUNNER_TEMP/supervisor-smoke"
          python tools/recording_session_smoke.py \
            --duration 2 --output-dir "$RUNNER_TEMP/session-smoke"

      - name: Commit bounded P1D tree
        run: |
          set -euo pipefail
          rm .github/workflows/p1d-recording-materialize-once.yml
          rm .github/workflows/p1d-recording-retry-once.yml
          git add -A -- .
          git diff --cached --name-status
          git diff --cached --check
          actual="$RUNNER_TEMP/actual-paths.txt"
          allowed="$RUNNER_TEMP/allowed-paths.txt"
          git diff --cached --name-only | sort > "$actual"
          cat > "$allowed" <<'EOF'
          .github/workflows/ci.yml
          .github/workflows/p1d-recording-materialize-once.yml
          .github/workflows/p1d-recording-retry-once.yml
          README.md
          app/api/__init__.py
          app/api/recording.py
          app/api/rooms.py
          app/db/migrations/__init__.py
          app/main.py
          app/media/ffmpeg.py
          app/recording/__init__.py
          app/recording/models.py
          app/recording/repository.py
          app/recording/service.py
          app/sessions/_write_store.py
          app/state.py
          docs/GITHUB_WORKFLOW.md
          docs/P1D_IMPLEMENTATION_PLAN.md
          docs/P1D_IMPLEMENTATION_REPORT.md
          tests/integration/test_app.py
          tests/integration/test_recording_api.py
          tests/integration/test_room_api.py
          tests/unit/test_database_and_settings.py
          tests/unit/test_ffmpeg_supervisor.py
          tests/unit/test_recipient_database_replay.py
          tests/unit/test_recording_session_service.py
          tests/unit/test_rooms.py
          tools/recording_session_smoke.py
          verify.bat
          web/assets/css/app.css
          web/assets/js/api.js
          web/assets/js/app.js
          web/index.html
          EOF
          sed -i 's/^          //' "$allowed"
          sort -o "$allowed" "$allowed"
          unexpected="$(comm -23 "$actual" "$allowed")"
          test -z "$unexpected"
          for required in \
            app/recording/repository.py \
            app/recording/service.py \
            app/api/recording.py \
            tools/recording_session_smoke.py \
            .github/workflows/p1d-recording-materialize-once.yml \
            .github/workflows/p1d-recording-retry-once.yml
          do
            grep -Fx "$required" "$actual" >/dev/null
          done
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: complete P1D single-room recording session"
          test -z "$(git status --short)"
          git push origin "HEAD:feature/p1d-single-room-recording-session"
          git rev-parse HEAD
