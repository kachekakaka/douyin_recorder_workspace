name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements/dev.lock

      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check

      - name: Verify repository baseline
        shell: bash
        run: |
          set -o pipefail
          python tools/verify_repository_baseline.py 2>&1 | tee "$RUNNER_TEMP/verify-baseline.log"

      - name: Verify P0 source boundaries
        shell: bash
        run: |
          set -o pipefail
          python tools/verify_source.py 2>&1 | tee "$RUNNER_TEMP/verify-source.log"

      - name: Compile Python
        run: python -m compileall -q app tests tools

      - name: Ruff
        shell: bash
        run: |
          set -o pipefail
          python -m ruff check --no-cache app tests tools 2>&1 | tee "$RUNNER_TEMP/ruff.log"

      - name: Pytest
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q -p no:cacheprovider --tb=short 2>&1 | tee "$RUNNER_TEMP/pytest.log"

      - name: Verify deterministic replay report
        run: |
          python tools/replay_recipient_fixture.py --quiet \
            --json-output "$RUNNER_TEMP/replay.json" \
            --markdown-output "$RUNNER_TEMP/replay.md"
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          actual_path = Path(os.environ["RUNNER_TEMP"]) / "replay.json"
          actual = json.loads(actual_path.read_text(encoding="utf-8"))
          expected = json.loads(
              Path("docs/protocol/P0_SYNTHETIC_REPLAY_REPORT.json").read_text(encoding="utf-8")
          )
          if actual != expected:
              raise SystemExit("deterministic replay report differs from committed baseline")
          PY

      - name: Install FFmpeg for supervisor smoke
        if: matrix.python-version == '3.12'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          ffmpeg -hide_banner -version
          ffprobe -hide_banner -version

      - name: FFmpeg Supervisor local smoke
        if: matrix.python-version == '3.12'
        shell: bash
        run: |
          set -o pipefail
          ffmpeg -hide_banner -version 2>&1 | tee "$RUNNER_TEMP/ffmpeg-smoke-output.log"
          python tools/ffmpeg_supervisor_smoke.py \
            --duration 2 \
            --output-dir "$RUNNER_TEMP/ffmpeg-smoke" \
            2>&1 | tee -a "$RUNNER_TEMP/ffmpeg-smoke-output.log"

      - name: Create and restore source recovery assets
        if: matrix.python-version == '3.12'
        shell: bash
        run: |
          set -o pipefail
          # CI validates the committed HEAD. Test-generated ignored files must not block this check.
          python tools/create_recovery_assets.py \
            --output-dir "$RUNNER_TEMP/recovery" \
            --label "ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --allow-dirty \
            2>&1 | tee "$RUNNER_TEMP/recovery.log"

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-${{ matrix.python-version }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/verify-baseline.log
            ${{ runner.temp }}/verify-source.log
            ${{ runner.temp }}/ruff.log
            ${{ runner.temp }}/pytest.log
            ${{ runner.temp }}/ffmpeg-smoke-output.log
            ${{ runner.temp }}/ffmpeg-smoke/ffmpeg.log
            ${{ runner.temp }}/recovery.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload verified recovery assets
        if: matrix.python-version == '3.12' && success()
        uses: actions/upload-artifact@v4
        with:
          name: p0-recovery-assets-${{ github.run_attempt }}
          path: ${{ runner.temp }}/recovery/*
          if-no-files-found: error
          retention-days: 7

  frontend-syntax:
    name: Frontend syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find web -type f -name '*.js' -print0)

  windows-verify:
    name: Windows verify.bat
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock
      - name: Run the exact Windows verification entrypoint
        shell: cmd
        run: |
          set "VERIFY_LOG=%RUNNER_TEMP%\verify-windows.log"
          call verify.bat > "%VERIFY_LOG%" 2>&1
          set "VERIFY_RC=%ERRORLEVEL%"
          type "%VERIFY_LOG%"
          exit /b %VERIFY_RC%
      - name: Upload Windows verification log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-verify-${{ github.run_attempt }}
          path: ${{ runner.temp }}/verify-windows.log
          if-no-files-found: ignore
          retention-days: 7

  materialize-resolver:
    name: Materialize verified P1A resolver
    if: >-
      (github.event_name == 'push' && github.ref_name == 'feature/p1a-single-room-media-foundation')
      || (github.event_name == 'pull_request' && github.head_ref == 'feature/p1a-single-room-media-foundation')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact triggering branch head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/p1a-single-room-media-foundation

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock

      - name: Materialize reviewed resolver sources
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        shell: bash
        run: |
          set -o pipefail
          python .github/p1a-resolver-materialize.py \
            2>&1 | tee "$RUNNER_TEMP/p1a-resolver-materialize.log"

      - name: Upload materializer diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: p1a-resolver-materialize-${{ github.run_attempt }}
          path: ${{ runner.temp }}/p1a-resolver-materialize.log
          if-no-files-found: error
          retention-days: 3

      - name: Create unpushed final resolver commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- \
            .github/p1a-resolver-materialize.py \
            .github/workflows/ci.yml \
            .github/workflows/p1a-resolver-assemble-once.yml \
            app/douyin/live_page.py \
            app/douyin/stream_resolver.py \
            app/rooms/service.py \
            app/state.py \
            tests/integration/test_room_api.py \
            tests/unit/test_douyin_network_probe.py \
            tests/unit/test_live_page.py \
            tests/unit/test_stream_resolver.py \
            tools/douyin_network_probe.py \
            tools/verify_source.py
          test "$(git diff --cached --name-only | wc -l)" -eq 13
          git diff --cached --check
          git commit -m "feat: add in-memory Douyin stream resolver fallback"
          test -z "$(git status --short)"

      - name: Install locked development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check

      - name: Run complete repository validation
        shell: bash
        run: |
          set -o pipefail
          {
            python tools/verify_repository_baseline.py
            python tools/verify_source.py
            python -m compileall -q app tests tools
            python -m ruff check --no-cache app tests tools
            python -m pytest -q -p no:cacheprovider --tb=short
            python tools/replay_recipient_fixture.py --quiet
            while IFS= read -r -d '' file; do
              node --check "$file"
            done < <(find web -type f -name '*.js' -print0)
          } 2>&1 | tee "$RUNNER_TEMP/p1a-resolver-validation.log"

      - name: Upload resolver validation diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: p1a-resolver-validation-${{ github.run_attempt }}
          path: ${{ runner.temp }}/p1a-resolver-validation.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          ffmpeg -hide_banner -version
          ffprobe -hide_banner -version

      - name: Run FFmpeg Supervisor smoke
        run: |
          python tools/ffmpeg_supervisor_smoke.py \
            --duration 2 \
            --output-dir "$RUNNER_TEMP/p1a-resolver-smoke"

      - name: Push verified resolver milestone
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(git status --short)"
          git push origin "HEAD:feature/p1a-single-room-media-foundation"
          git rev-parse HEAD
