name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements/dev.lock

      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check

      - name: Verify repository baseline
        shell: bash
        run: |
          set -o pipefail
          python tools/verify_repository_baseline.py 2>&1 | tee "$RUNNER_TEMP/verify-baseline.log"

      - name: Verify P0 source boundaries
        shell: bash
        run: |
          set -o pipefail
          python tools/verify_source.py 2>&1 | tee "$RUNNER_TEMP/verify-source.log"

      - name: Compile Python
        run: python -m compileall -q app tests tools

      - name: Ruff
        shell: bash
        run: |
          set -o pipefail
          python -m ruff check --no-cache app tests tools 2>&1 | tee "$RUNNER_TEMP/ruff.log"

      - name: Pytest
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q -p no:cacheprovider --tb=short 2>&1 | tee "$RUNNER_TEMP/pytest.log"

      - name: Verify deterministic replay report
        run: |
          python tools/replay_recipient_fixture.py --quiet \
            --json-output "$RUNNER_TEMP/replay.json" \
            --markdown-output "$RUNNER_TEMP/replay.md"
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          actual_path = Path(os.environ["RUNNER_TEMP"]) / "replay.json"
          actual = json.loads(actual_path.read_text(encoding="utf-8"))
          expected = json.loads(
              Path("docs/protocol/P0_SYNTHETIC_REPLAY_REPORT.json").read_text(encoding="utf-8")
          )
          if actual != expected:
              raise SystemExit("deterministic replay report differs from committed baseline")
          PY

      - name: Verify deterministic recipient database replay
        run: |
          python tools/replay_recipient_fixture_to_db.py \
            --output "$RUNNER_TEMP/recipient-database-replay.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["RUNNER_TEMP"]) / "recipient-database-replay.json"
          report = json.loads(path.read_text(encoding="utf-8"))
          expected_summary = {
              "target_messages": 7,
              "unique_event_count": 6,
              "duplicate_frame_count": 1,
              "late_event_count": 1,
              "interval_count": 7,
          }
          if report.get("schema_version") != 6:
              raise SystemExit("recipient database replay schema mismatch")
          if report.get("contract_live_verified") is not False:
              raise SystemExit("recipient database replay changed live_verified")
          if report.get("summary") != expected_summary:
              raise SystemExit("recipient database replay summary mismatch")
          rendered = json.dumps(report, sort_keys=True)
          for forbidden in (
              "raw_payload_json",
              "extra_json",
              "unknown_fields_json",
              "frame_base64",
          ):
              if forbidden in rendered:
                  raise SystemExit(f"recipient database replay leaked {forbidden}")
          PY

      - name: v0.1.1 backup restore and diagnostics smoke
        if: matrix.python-version == '3.12'
        shell: bash
        run: |
          set -o pipefail
          python tools/backup_restore_smoke.py \
            --output-dir "$RUNNER_TEMP/backup-restore-smoke" \
            --json-output "$RUNNER_TEMP/backup-restore-smoke.json" \
            2>&1 | tee "$RUNNER_TEMP/backup-restore-smoke.log"
          python tools/diagnostics_report.py \
            --root . \
            --output "$RUNNER_TEMP/diagnostics-report.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          temp = Path(os.environ["RUNNER_TEMP"])
          smoke = json.loads(
              (temp / "backup-restore-smoke.json").read_text(encoding="utf-8")
          )
          diagnostics = json.loads(
              (temp / "diagnostics-report.json").read_text(encoding="utf-8")
          )
          if smoke.get("passed") is not True:
              raise SystemExit("backup restore smoke did not pass")
          if smoke.get("database", {}).get("restored_schema_version") != 6:
              raise SystemExit("backup restore schema mismatch")
          if diagnostics.get("protocol_contract", {}).get("live_verified") is not False:
              raise SystemExit("diagnostics changed live_verified")
          rendered = json.dumps({"smoke": smoke, "diagnostics": diagnostics}, sort_keys=True)
          for forbidden in (
              "private-value-must-not-appear",
              "raw_payload_json",
              "frame_base64",
          ):
              if forbidden in rendered:
                  raise SystemExit(f"stability report leaked {forbidden}")
          PY

      - name: Ensure FFmpeg for media smoke tests
        if: matrix.python-version == '3.12'
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1 || ! command -v ffprobe >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends ffmpeg
          fi
          ffmpeg -hide_banner -version
          ffprobe -hide_banner -version

      - name: FFmpeg Supervisor local smoke
        if: matrix.python-version == '3.12'
        shell: bash
        run: |
          set -o pipefail
          ffmpeg -hide_banner -version 2>&1 | tee "$RUNNER_TEMP/ffmpeg-smoke-output.log"
          python tools/ffmpeg_supervisor_smoke.py \
            --duration 2 \
            --output-dir "$RUNNER_TEMP/ffmpeg-smoke" \
            2>&1 | tee -a "$RUNNER_TEMP/ffmpeg-smoke-output.log"

      - name: P1D recording Session local smoke
        if: matrix.python-version == '3.12'
        shell: bash
        run: |
          set -o pipefail
          python tools/recording_session_smoke.py \
            --duration 2 \
            --output-dir "$RUNNER_TEMP/recording-session-smoke" \
            2>&1 | tee "$RUNNER_TEMP/recording-session-smoke.log"

      - name: P3A postprocess local smoke
        if: matrix.python-version == '3.12'
        shell: bash
        run: |
          set -o pipefail
          python tools/postprocess_smoke.py \
            --duration 2 \
            --output-dir "$RUNNER_TEMP/postprocess-smoke" \
            2>&1 | tee "$RUNNER_TEMP/postprocess-smoke.log"

      - name: Create and restore source recovery assets
        if: matrix.python-version == '3.12'
        shell: bash
        run: |
          set -o pipefail
          # CI validates the committed HEAD. Test-generated ignored files must not block this check.
          python tools/create_recovery_assets.py \
            --output-dir "$RUNNER_TEMP/recovery" \
            --label "ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --allow-dirty \
            2>&1 | tee "$RUNNER_TEMP/recovery.log"

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-${{ matrix.python-version }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/verify-baseline.log
            ${{ runner.temp }}/verify-source.log
            ${{ runner.temp }}/ruff.log
            ${{ runner.temp }}/pytest.log
            ${{ runner.temp }}/ffmpeg-smoke-output.log
            ${{ runner.temp }}/ffmpeg-smoke/ffmpeg.log
            ${{ runner.temp }}/recording-session-smoke.log
            ${{ runner.temp }}/postprocess-smoke.log
            ${{ runner.temp }}/backup-restore-smoke.log
            ${{ runner.temp }}/backup-restore-smoke.json
            ${{ runner.temp }}/diagnostics-report.json
            ${{ runner.temp }}/recovery.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload verified recovery assets
        if: matrix.python-version == '3.12' && success()
        uses: actions/upload-artifact@v4
        with:
          name: p0-recovery-assets-${{ github.run_attempt }}
          path: ${{ runner.temp }}/recovery/*
          if-no-files-found: error
          retention-days: 7

  frontend-syntax:
    name: Frontend syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find web -type f -name '*.js' -print0)

  windows-verify:
    name: Windows verify.bat
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock
      - name: Run the exact Windows verification entrypoint
        shell: cmd
        run: |
          set "VERIFY_LOG=%RUNNER_TEMP%\verify-windows.log"
          call verify.bat > "%VERIFY_LOG%" 2>&1
          set "VERIFY_RC=%ERRORLEVEL%"
          type "%VERIFY_LOG%"
          exit /b %VERIFY_RC%
      - name: Upload Windows verification log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-verify-${{ github.run_attempt }}
          path: ${{ runner.temp }}/verify-windows.log
          if-no-files-found: ignore
          retention-days: 7
