name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-baseline:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify repository baseline
        run: python tools/verify_repository_baseline.py

      - name: Compile tracked Python
        run: python -m compileall -q app tests tools

  frontend-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check JavaScript syntax when present
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find web -type f -name '*.js' -print0)
          if (( ${#files[@]} == 0 )); then
            echo "No JavaScript files yet; baseline check complete."
            exit 0
          fi
          for file in "${files[@]}"; do
            node --check "$file"
          done
