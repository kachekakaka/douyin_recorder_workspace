name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-recipient-core:
    name: Materialize verified P1B recipient core
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'feature/p1b-single-room-recipient-foundation'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout exact P1B branch head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/p1b-single-room-recipient-foundation

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock

      - name: Materialize reviewed transaction core and restore normal CI
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = "fbd9e1bf83fc0958716172ec6f5f81b87a6988db"
          test "$(git diff --name-only HEAD^ HEAD)" = ".github/workflows/ci.yml"
          test -f .github/workflows/p1b-recipient-core-publish-once.yml
          test ! -e app/sessions/repository.py

          payload="$RUNNER_TEMP/p1b-recipient-core.tar.gz"
          gh api "repos/$GITHUB_REPOSITORY/git/blobs/a78ed97b0d4ab674feff47071732ed657d48ccde" \
            --jq .content | tr -d '\n' | base64 --decode > "$payload"
          echo "7586cd1ebec8171ef60ebcac183e292db30a0de26b8b32260e378578c7399977  $payload" \
            | sha256sum -c -
          test "$(tar -tzf "$payload" | sort)" = "$(printf '%s\n' \
            app/sessions/__init__.py \
            app/sessions/models.py \
            app/sessions/repository.py \
            app/sessions/service.py \
            tests/unit/test_recipient_session_repository.py | sort)"
          tar -xzf "$payload"

          while read -r path expected; do
            actual="$(git hash-object "$path")"
            test "$actual" = "$expected" || {
              echo "blob mismatch: $path expected=$expected actual=$actual" >&2
              exit 1
            }
          done <<'EOF'
          app/sessions/__init__.py 247127918b993cbdf0b6eef4dd0b404c30f6b1d7
          app/sessions/models.py 577a8c1a81ddd4dc49f645968a69d7c179e8118d
          app/sessions/repository.py 8fe63fa916e90c5111552a41310adfee25b30247
          app/sessions/service.py f9157ae2bc4f3973e8658924c0b756573890fcb4
          tests/unit/test_recipient_session_repository.py 8136f570b514cb8e4c266c3f19df6ada7d20177f
          EOF

          gh api "repos/$GITHUB_REPOSITORY/git/blobs/1600ba1430307307697e6b0eb88fef05af318a54" \
            --jq .content | tr -d '\n' | base64 --decode > .github/workflows/ci.yml
          rm .github/workflows/p1b-recipient-core-publish-once.yml
          python - <<'PY'
          import json
          from pathlib import Path

          contract = json.loads(
              Path("app/douyin/contracts/provisional_v1.json").read_text(encoding="utf-8")
          )
          if contract.get("live_verified") is not False:
              raise SystemExit("live_verified must remain false")
          PY
          git diff --check

      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check

      - name: Run complete source validation
        shell: bash
        run: |
          set -euo pipefail
          python tools/verify_repository_baseline.py
          python tools/verify_source.py
          python -m compileall -q app tests tools
          python -m ruff check --no-cache app tests tools
          python -m pytest -q -p no:cacheprovider --tb=short
          python tools/replay_recipient_fixture.py --quiet
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find web -type f -name '*.js' -print0)

      - name: Install FFmpeg and run supervisor smoke
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          python tools/ffmpeg_supervisor_smoke.py \
            --duration 2 \
            --output-dir "$RUNNER_TEMP/p1b-recipient-core-smoke"

      - name: Commit and push verified transaction core
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin feature/p1b-single-room-recipient-foundation
          test "$(git rev-parse origin/feature/p1b-single-room-recipient-foundation)" = "$GITHUB_SHA"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- \
            .github/workflows/ci.yml \
            .github/workflows/p1b-recipient-core-publish-once.yml \
            app/sessions/__init__.py \
            app/sessions/models.py \
            app/sessions/repository.py \
            app/sessions/service.py \
            tests/unit/test_recipient_session_repository.py
          test "$(git diff --cached --name-only | wc -l)" -eq 7
          git diff --cached --check
          git commit -m "feat: persist recipient events and strict timeline transactions"
          test -z "$(git status --short)"
          git push origin "HEAD:feature/p1b-single-room-recipient-foundation"
          git rev-parse HEAD

  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements/dev.lock

      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check

      - name: Verify repository baseline
        shell: bash
        run: |
          set -o pipefail
          python tools/verify_repository_baseline.py 2>&1 | tee "$RUNNER_TEMP/verify-baseline.log"

      - name: Verify P0 source boundaries
        shell: bash
        run: |
          set -o pipefail
          python tools/verify_source.py 2>&1 | tee "$RUNNER_TEMP/verify-source.log"

      - name: Compile Python
        run: python -m compileall -q app tests tools

      - name: Ruff
        shell: bash
        run: |
          set -o pipefail
          python -m ruff check --no-cache app tests tools 2>&1 | tee "$RUNNER_TEMP/ruff.log"

      - name: Pytest
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q -p no:cacheprovider --tb=short 2>&1 | tee "$RUNNER_TEMP/pytest.log"

      - name: Verify deterministic replay report
        run: |
          python tools/replay_recipient_fixture.py --quiet \
            --json-output "$RUNNER_TEMP/replay.json" \
            --markdown-output "$RUNNER_TEMP/replay.md"
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          actual_path = Path(os.environ["RUNNER_TEMP"]) / "replay.json"
          actual = json.loads(actual_path.read_text(encoding="utf-8"))
          expected = json.loads(
              Path("docs/protocol/P0_SYNTHETIC_REPLAY_REPORT.json").read_text(encoding="utf-8")
          )
          if actual != expected:
              raise SystemExit("deterministic replay report differs from committed baseline")
          PY

      - name: Install FFmpeg for supervisor smoke
        if: matrix.python-version == '3.12'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          ffmpeg -hide_banner -version
          ffprobe -hide_banner -version

      - name: FFmpeg Supervisor local smoke
        if: matrix.python-version == '3.12'
        shell: bash
        run: |
          set -o pipefail
          ffmpeg -hide_banner -version 2>&1 | tee "$RUNNER_TEMP/ffmpeg-smoke-output.log"
          python tools/ffmpeg_supervisor_smoke.py \
            --duration 2 \
            --output-dir "$RUNNER_TEMP/ffmpeg-smoke" \
            2>&1 | tee -a "$RUNNER_TEMP/ffmpeg-smoke-output.log"

      - name: Create and restore source recovery assets
        if: matrix.python-version == '3.12'
        shell: bash
        run: |
          set -o pipefail
          # CI validates the committed HEAD. Test-generated ignored files must not block this check.
          python tools/create_recovery_assets.py \
            --output-dir "$RUNNER_TEMP/recovery" \
            --label "ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --allow-dirty \
            2>&1 | tee "$RUNNER_TEMP/recovery.log"

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-${{ matrix.python-version }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/verify-baseline.log
            ${{ runner.temp }}/verify-source.log
            ${{ runner.temp }}/ruff.log
            ${{ runner.temp }}/pytest.log
            ${{ runner.temp }}/ffmpeg-smoke-output.log
            ${{ runner.temp }}/ffmpeg-smoke/ffmpeg.log
            ${{ runner.temp }}/recovery.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload verified recovery assets
        if: matrix.python-version == '3.12' && success()
        uses: actions/upload-artifact@v4
        with:
          name: p0-recovery-assets-${{ github.run_attempt }}
          path: ${{ runner.temp }}/recovery/*
          if-no-files-found: error
          retention-days: 7

  frontend-syntax:
    name: Frontend syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find web -type f -name '*.js' -print0)

  windows-verify:
    name: Windows verify.bat
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock
      - name: Run the exact Windows verification entrypoint
        shell: cmd
        run: |
          set "VERIFY_LOG=%RUNNER_TEMP%\verify-windows.log"
          call verify.bat > "%VERIFY_LOG%" 2>&1
          set "VERIFY_RC=%ERRORLEVEL%"
          type "%VERIFY_LOG%"
          exit /b %VERIFY_RC%
      - name: Upload Windows verification log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-verify-${{ github.run_attempt }}
          path: ${{ runner.temp }}/verify-windows.log
          if-no-files-found: ignore
          retention-days: 7
