name: CI

on:
  push:
    branches: [main, feature/p0-bootstrap]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements/dev.lock

      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check

      - name: Verify repository baseline
        shell: bash
        run: |
          set -o pipefail
          python tools/verify_repository_baseline.py 2>&1 | tee verify-baseline.log

      - name: Verify P0 source boundaries
        shell: bash
        run: |
          set -o pipefail
          python tools/verify_source.py 2>&1 | tee verify-source.log

      - name: Compile Python
        run: python -m compileall -q app tests tools

      - name: Ruff
        run: python -m ruff check --no-cache app tests tools

      - name: Pytest
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q -p no:cacheprovider --tb=short 2>&1 | tee pytest.log

      - name: Verify deterministic replay report
        run: |
          python tools/replay_recipient_fixture.py --quiet \
            --json-output "$RUNNER_TEMP/replay.json" \
            --markdown-output "$RUNNER_TEMP/replay.md"
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          actual_path = Path(os.environ["RUNNER_TEMP"]) / "replay.json"
          actual = json.loads(actual_path.read_text(encoding="utf-8"))
          expected = json.loads(
              Path("docs/protocol/P0_SYNTHETIC_REPLAY_REPORT.json").read_text(encoding="utf-8")
          )
          if actual != expected:
              raise SystemExit("deterministic replay report differs from committed baseline")
          PY

      - name: Create and restore source recovery assets
        if: matrix.python-version == '3.12'
        run: |
          python tools/create_recovery_assets.py \
            --output-dir "$RUNNER_TEMP/recovery" \
            --label "ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-${{ matrix.python-version }}-${{ github.run_attempt }}
          path: |
            verify-baseline.log
            verify-source.log
            pytest.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload verified recovery assets
        if: matrix.python-version == '3.12' && success()
        uses: actions/upload-artifact@v4
        with:
          name: p0-recovery-assets-${{ github.run_attempt }}
          path: ${{ runner.temp }}/recovery/*
          if-no-files-found: error
          retention-days: 7

  frontend-syntax:
    name: Frontend syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find web -type f -name '*.js' -print0)

  windows-verify:
    name: Windows verify.bat
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock
      - name: Run the exact Windows verification entrypoint
        shell: cmd
        run: verify.bat
