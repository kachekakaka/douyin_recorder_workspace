name: P1B API publish once

on:
  push:
    branches: [feature/p1b-single-room-recipient-foundation]
    paths:
      - .github/workflows/p1b-api-once.yml

permissions:
  contents: write

concurrency:
  group: p1b-milestone-publishers
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/p1b-single-room-recipient-foundation
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements/dev.lock
      - name: Wait for transaction projection milestone
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            git fetch origin feature/p1b-single-room-recipient-foundation
            if git cat-file -e origin/feature/p1b-single-room-recipient-foundation:app/recipients/repository.py 2>/dev/null; then
              git reset --hard origin/feature/p1b-single-room-recipient-foundation
              exit 0
            fi
            sleep 5
          done
          echo 'recipient transaction projection was not published' >&2
          exit 1
      - name: Materialize read-only API
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          state_path = Path('app/state.py')
          state = state_path.read_text(encoding='utf-8')
          if 'from app.recipients import RecipientRepository, RecipientService' not in state:
              marker = 'from app.rooms import RoomRepository, RoomService\n'
              if marker not in state:
                  raise SystemExit('room state import marker not found')
              state = state.replace(marker, marker + 'from app.recipients import RecipientRepository, RecipientService\n')
          if 'recipient_repository: RecipientRepository' not in state:
              state = state.replace(
                  '    room_service: RoomService\n',
                  '    room_service: RoomService\n    recipient_repository: RecipientRepository\n    recipient_service: RecipientService\n',
              )
          if 'recipient_repository = RecipientRepository(database)' not in state:
              marker = '        room_repository = RoomRepository(database)\n'
              if marker not in state:
                  raise SystemExit('room repository construction marker not found')
              state = state.replace(
                  marker,
                  marker + '        recipient_repository = RecipientRepository(database)\n        recipient_service = RecipientService(recipient_repository)\n',
              )
          if 'recipient_repository=recipient_repository' not in state:
              state = state.replace(
                  '            room_service=room_service,\n',
                  '            room_service=room_service,\n            recipient_repository=recipient_repository,\n            recipient_service=recipient_service,\n',
              )
          state_path.write_text(state, encoding='utf-8')

          api_path = Path('app/api/recipient.py')
          api_path.write_text('''from __future__ import annotations\n\nfrom typing import Any\n\nfrom fastapi import APIRouter, HTTPException, Query, Request\n\nrouter = APIRouter(prefix="/api/rooms/{room_key}/recipient", tags=["recipient"])\n\n\ndef _core(request: Request) -> Any:\n    for name in ("core", "app_state", "state"):\n        value = getattr(request.app.state, name, None)\n        if value is not None and hasattr(value, "recipient_service"):\n            return value\n    raise RuntimeError("application state is unavailable")\n\n\nasync def _require_room(core: Any, room_key: str) -> None:\n    getter = getattr(core.room_repository, "get_room", None)\n    if getter is None:\n        getter = getattr(core.room_repository, "get", None)\n    room = await getter(room_key) if getter is not None else None\n    if room is None:\n        raise HTTPException(status_code=404, detail="room not found")\n\n\n@router.get("/state")\nasync def recipient_state(room_key: str, request: Request) -> dict[str, object]:\n    core = _core(request)\n    await _require_room(core, room_key)\n    snapshot = await core.recipient_service.get_state(room_key=room_key)\n    return snapshot.to_public_dict()\n\n\n@router.get("/events")\nasync def recipient_events(\n    room_key: str, request: Request,\n    limit: int = Query(100, ge=1, le=500),\n    offset: int = Query(0, ge=0),\n) -> dict[str, object]:\n    core = _core(request)\n    await _require_room(core, room_key)\n    events = await core.recipient_service.list_events(\n        room_key=room_key, limit=limit, offset=offset\n    )\n    return {"items": [event.to_public_dict() for event in events],\n            "limit": limit, "offset": offset}\n\n\n@router.get("/intervals")\nasync def recipient_intervals(\n    room_key: str, request: Request,\n    limit: int = Query(100, ge=1, le=500),\n    offset: int = Query(0, ge=0),\n) -> dict[str, object]:\n    core = _core(request)\n    await _require_room(core, room_key)\n    intervals = await core.recipient_service.list_intervals(\n        room_key=room_key, limit=limit, offset=offset\n    )\n    return {"items": [interval.to_public_dict() for interval in intervals],\n            "limit": limit, "offset": offset}\n''', encoding='utf-8')

          main_path = Path('app/main.py')
          main = main_path.read_text(encoding='utf-8')
          if 'from app.api.recipient import router as recipient_router' not in main:
              matches = list(re.finditer(r'(?m)^from app\.api\.[^\n]+$', main))
              if not matches:
                  raise SystemExit('API import marker not found')
              position = matches[-1].end()
              main = main[:position] + '\nfrom app.api.recipient import router as recipient_router' + main[position:]
          if 'include_router(recipient_router)' not in main:
              matches = list(re.finditer(r'(?m)^(\s*)app\.include_router\([^\n]+\)\s*$', main))
              if not matches:
                  raise SystemExit('router inclusion marker not found')
              match = matches[-1]
              main = main[:match.end()] + f'\n{match.group(1)}app.include_router(recipient_router)' + main[match.end():]
          main_path.write_text(main, encoding='utf-8')

          Path('tests/unit/test_recipient_api_routes.py').write_text('''from app.api.recipient import router\n\n\ndef test_recipient_read_only_routes_are_registered() -> None:\n    methods = {(route.path, tuple(sorted(route.methods or set()))) for route in router.routes}\n    assert ("/api/rooms/{room_key}/recipient/state", ("GET",)) in methods\n    assert ("/api/rooms/{room_key}/recipient/events", ("GET",)) in methods\n    assert ("/api/rooms/{room_key}/recipient/intervals", ("GET",)) in methods\n''', encoding='utf-8')
          PY
      - name: Validate and publish API milestone
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/p1b-api-once.yml
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check
          python tools/verify_repository_baseline.py
          python tools/verify_source.py
          python -m compileall -q app tests tools
          python -m ruff check --no-cache app tests tools
          python -m pytest -q -p no:cacheprovider --tb=short
          python tools/replay_recipient_fixture.py --quiet
          python tools/replay_recipient_database.py --output "$RUNNER_TEMP/recipient-db-replay.json"
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: expose read-only recipient state APIs'
          git push origin HEAD:feature/p1b-single-room-recipient-foundation
