name: P4A fix cross-platform ZIP order once

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/p4a-zip-order-fix-once.yml

permissions:
  contents: write

concurrency:
  group: p4a-zip-order-fix-once
  cancel-in-progress: false

jobs:
  fix:
    name: Apply verified cross-platform ZIP order fix
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'feature/p4a-release-packaging'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/p4a-release-packaging

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock

      - name: Verify exact staging head
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
          test "$(git rev-parse HEAD^)" = "a17fdee0344eba7f4c71ec46e9afcc984b6287be"
          test "$(git diff --name-only HEAD^ HEAD)" = ".github/workflows/p4a-zip-order-fix-once.yml"

      - name: Apply cross-platform POSIX path ordering
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("tools/release_package.py")
          text = path.read_text(encoding="utf-8")
          old = '''def _relative_files(root: Path) -> list[Path]:
              output: list[Path] = []
              for path in sorted(root.rglob("*")):
                  if path.is_symlink():
                      raise ReleaseError(f"包内禁止符号链接: {path}")
                  if path.is_file():
                      output.append(path.relative_to(root))
              return output
          '''
          new = '''def _relative_files(root: Path) -> list[Path]:
              output: list[Path] = []
              for path in root.rglob("*"):
                  if path.is_symlink():
                      raise ReleaseError(f"包内禁止符号链接: {path}")
                  if path.is_file():
                      output.append(path.relative_to(root))
              output.sort(key=lambda item: item.as_posix())
              return output
          '''
          if old not in text:
              raise SystemExit("expected _relative_files block was not found")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          git diff --check
          test "$(git diff --name-only)" = "tools/release_package.py"

      - name: Run complete validation
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check
          python tools/verify_repository_baseline.py
          python tools/verify_source.py
          python -m compileall -q app tests tools
          python -m ruff check --no-cache app tests tools
          python -m pytest -q -p no:cacheprovider --tb=short
          python tools/release_package.py validate-lock
          python tools/replay_recipient_fixture.py --quiet
          python tools/replay_recipient_fixture_to_db.py --output "$RUNNER_TEMP/recipient-db.json"

      - name: Commit and push business fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/release_package.py
          test "$(git diff --cached --name-only)" = "tools/release_package.py"
          git commit -m "fix: make release ZIP ordering cross-platform"
          git push origin "HEAD:feature/p4a-release-packaging"
          git rev-parse HEAD
