name: Final Release Asset Audit

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/final-release-asset-audit.yml"

permissions:
  contents: read

jobs:
  audit:
    name: Download and independently verify v0.1.0 assets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Emit compact immutable Release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/releases/tags/v0.1.0" > "$RUNNER_TEMP/release.json"
          jq -e '
            .id == 357811419 and
            .tag_name == "v0.1.0" and
            .draft == false and
            .prerelease == false and
            (.assets | length == 9) and
            all(.assets[]; .size > 0 and (.digest | startswith("sha256:")))
          ' "$RUNNER_TEMP/release.json" >/dev/null
          jq -c '{
            release_id: .id,
            release_name: .name,
            tag_name: .tag_name,
            published_at: .published_at,
            draft: .draft,
            prerelease: .prerelease,
            assets: [.assets[] | {name, size, digest}]
          }' "$RUNNER_TEMP/release.json" | tee "$RUNNER_TEMP/final-release-asset-audit.json"

      - name: Checkout report branch tools
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download immutable Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          release="$RUNNER_TEMP/release-assets"
          mkdir -p "$release"
          gh release download v0.1.0 --dir "$release"

      - name: Verify asset checksums and Windows package
        shell: bash
        run: |
          set -euo pipefail
          release="$RUNNER_TEMP/release-assets"
          (cd "$release" && sha256sum -c windows-asset-SHA256SUMS.txt)
          (cd "$release" && sha256sum -c source-SHA256SUMS.txt)
          package="$RUNNER_TEMP/windows-package"
          mkdir -p "$package"
          unzip -q "$release/douyin-recorder-v0.1.0-windows-x64.zip" -d "$package"
          python tools/release_package.py verify --package-root "$package" > "$RUNNER_TEMP/windows-verify.json"
          test "$(jq -r '.source_commit' "$package/windows-manifest.json")" = "b8056289ea9c18504675ff1dd43df84a977b2436"
          test -s "$package/THIRD_PARTY_NOTICES.md"
          test -s "$package/licenses/Gyan-FFmpeg-Build-NOTICE.md"
          test -s "$package/licenses/FFmpeg-NOTICE.md"
          test "$(jq '.dependencies | length' "$package/python-dependencies.json")" -gt 0

      - name: Verify source ZIP and Git Bundle restoration
        shell: bash
        run: |
          set -euo pipefail
          release="$RUNNER_TEMP/release-assets"
          bundle="$release/douyin-recorder-v0.1.0-source.bundle"
          git bundle verify "$bundle"
          restore="$RUNNER_TEMP/source-restore"
          git clone --quiet "$bundle" "$restore"
          git -C "$restore" checkout --quiet --detach b8056289ea9c18504675ff1dd43df84a977b2436
          test "$(git -C "$restore" rev-parse HEAD)" = "b8056289ea9c18504675ff1dd43df84a977b2436"
          test "$(git -C "$restore" rev-parse HEAD^{tree})" = "$(git rev-parse b8056289ea9c18504675ff1dd43df84a977b2436^{tree})"
          source_extract="$RUNNER_TEMP/source-zip"
          mkdir -p "$source_extract"
          unzip -q "$release/douyin-recorder-v0.1.0-source.zip" -d "$source_extract"
          python - "$release/source-tree-manifest.json" "$source_extract" <<'PY'
          import hashlib
          import json
          import sys
          from pathlib import Path

          manifest_path = Path(sys.argv[1])
          root = Path(sys.argv[2])
          payload = json.loads(manifest_path.read_text(encoding="utf-8"))
          assert payload["commit"] == "b8056289ea9c18504675ff1dd43df84a977b2436"
          expected = set()
          for row in payload["files"]:
              relative = row["path"]
              expected.add(relative)
              path = root / relative
              assert path.is_file() and not path.is_symlink(), relative
              assert path.stat().st_size == row["bytes"], relative
              assert hashlib.sha256(path.read_bytes()).hexdigest() == row["sha256"], relative
          actual = {
              path.relative_to(root).as_posix()
              for path in root.rglob("*")
              if path.is_file()
          }
          assert actual == expected, (sorted(expected - actual), sorted(actual - expected))
          PY

      - name: Upload independent audit record
        uses: actions/upload-artifact@v4
        with:
          name: final-release-asset-audit-${{ github.run_attempt }}
          path: ${{ runner.temp }}/final-release-asset-audit.json
          if-no-files-found: error
          retention-days: 14
