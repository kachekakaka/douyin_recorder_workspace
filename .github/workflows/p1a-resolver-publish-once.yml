name: P1A resolver publish once

on:
  push:
    branches: [feature/p1a-single-room-media-foundation]
    paths:
      - .github/workflows/p1a-resolver-publish-once.yml

permissions:
  contents: write

concurrency:
  group: p1a-resolver-publish-once
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/p1a-single-room-media-foundation

      - name: Reconstruct and verify resolver sources
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

          payload_b64="$RUNNER_TEMP/p1a-resolver.b64"
          payload_tar="$RUNNER_TEMP/p1a-resolver.tar.gz"
          : > "$payload_b64"

          for sha in \
            82863611cceb754dedf783cdc2876c3991385d8c \
            a399c936b36f8a9025710b1302eead7fbc4b28d1 \
            b10ec6326b39e8ba7eabf0604b8d3b1c06540eb4 \
            2daeaa57cb9ae987c76ade219ff4e96a24043c76 \
            ddf912ed4f80c13a53b3f4c0584da30bac32e267 \
            2bfc57f662563a918d6e8290333e1b5a211d5676; do
            gh api "repos/$GITHUB_REPOSITORY/git/blobs/$sha" --jq .content \
              | tr -d '\n' \
              | base64 --decode >> "$payload_b64"
          done

          test "$(wc -c < "$payload_b64")" -eq 35288
          base64 --decode "$payload_b64" > "$payload_tar"
          echo "1cc082895219af8619cce7daac1ba0e43752f983cffc4c6c5b11be72b9ebebbf  $payload_tar" \
            | sha256sum -c -

          PAYLOAD_TAR="$payload_tar" python - <<'PY'
          import os
          import tarfile
          from pathlib import Path, PurePosixPath

          expected = {
              "app/douyin/live_page.py": "70b53ac3ac19b27d3075d37b251b00492d06faf2",
              "app/douyin/stream_resolver.py": "24232cb1c47f9d7846ea3167d1091a06a4abca18",
              "app/rooms/service.py": "b3fb9c7c4a3e6e1c7cd1358c60104e6084cae5d1",
              "app/state.py": "28908ca5953563b24b6d4cab305839fcd526e91d",
              "tests/integration/test_room_api.py": "1dbdb32faa45ff898ec75abd3022789ccf9597a4",
              "tests/unit/test_live_page.py": "feca4b10de013093dfc12896884108b8a2e8ef33",
              "tests/unit/test_room_service_resolver.py": "0a1f2ced63e6d88fb6c8cefeba38d8d29dba0b45",
              "tests/unit/test_stream_resolver.py": "2773a2cf0ace8e3e39687e4a1965e416042553ca",
              "tools/douyin_network_probe.py": "36738b81dadd3bbceb346f4d9e3c7aff074a7221",
              "tools/verify_source.py": "a8c86d41bcf3295425a36a041134592feb6c7532",
          }
          root = Path.cwd().resolve()
          with tarfile.open(os.environ["PAYLOAD_TAR"], "r:gz") as bundle:
              members = bundle.getmembers()
              if {member.name for member in members} != set(expected):
                  raise SystemExit("unexpected resolver payload paths")
              for member in members:
                  path = PurePosixPath(member.name)
                  if path.is_absolute() or ".." in path.parts or not member.isfile():
                      raise SystemExit(f"unsafe payload member: {member.name}")
                  target = (root / Path(*path.parts)).resolve()
                  if root not in target.parents:
                      raise SystemExit(f"payload escaped repository: {member.name}")
                  source = bundle.extractfile(member)
                  if source is None:
                      raise SystemExit(f"payload member unreadable: {member.name}")
                  target.parent.mkdir(parents=True, exist_ok=True)
                  target.write_bytes(source.read())
          PY

          while read -r path sha; do
            actual="$(git hash-object "$path")"
            test "$actual" = "$sha" || {
              echo "blob mismatch: $path expected=$sha actual=$actual" >&2
              exit 1
            }
          done <<'EOF'
          app/douyin/live_page.py 70b53ac3ac19b27d3075d37b251b00492d06faf2
          app/douyin/stream_resolver.py 24232cb1c47f9d7846ea3167d1091a06a4abca18
          app/rooms/service.py b3fb9c7c4a3e6e1c7cd1358c60104e6084cae5d1
          app/state.py 28908ca5953563b24b6d4cab305839fcd526e91d
          tests/integration/test_room_api.py 1dbdb32faa45ff898ec75abd3022789ccf9597a4
          tests/unit/test_live_page.py feca4b10de013093dfc12896884108b8a2e8ef33
          tests/unit/test_room_service_resolver.py 0a1f2ced63e6d88fb6c8cefeba38d8d29dba0b45
          tests/unit/test_stream_resolver.py 2773a2cf0ace8e3e39687e4a1965e416042553ca
          tools/douyin_network_probe.py 36738b81dadd3bbceb346f4d9e3c7aff074a7221
          tools/verify_source.py a8c86d41bcf3295425a36a041134592feb6c7532
          EOF

          rm .github/workflows/p1a-resolver-publish-once.yml
          python - <<'PY'
          import json
          from pathlib import Path
          contract = json.loads(Path("app/douyin/contracts/provisional_v1.json").read_text())
          if contract.get("live_verified") is not False:
              raise SystemExit("provisional contract must remain live_verified=false")
          PY
          git diff --check

      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check

      - name: Run complete validation
        shell: bash
        run: |
          set -euo pipefail
          python tools/verify_repository_baseline.py
          python tools/verify_source.py
          python -m compileall -q app tests tools
          python -m ruff check --no-cache app tests tools
          python -m pytest -q -p no:cacheprovider --tb=short
          python tools/replay_recipient_fixture.py --quiet
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find web -type f -name '*.js' -print0)

      - name: Install FFmpeg and run smoke
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          python tools/ffmpeg_supervisor_smoke.py \
            --duration 2 \
            --output-dir "$RUNNER_TEMP/p1a-resolver-smoke"

      - name: Commit and push resolver milestone
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin feature/p1a-single-room-media-foundation
          test "$(git rev-parse origin/feature/p1a-single-room-media-foundation)" = "$GITHUB_SHA"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- \
            .github/workflows/p1a-resolver-publish-once.yml \
            app/douyin/live_page.py \
            app/douyin/stream_resolver.py \
            app/rooms/service.py \
            app/state.py \
            tests/integration/test_room_api.py \
            tests/unit/test_live_page.py \
            tests/unit/test_room_service_resolver.py \
            tests/unit/test_stream_resolver.py \
            tools/douyin_network_probe.py \
            tools/verify_source.py
          test "$(git diff --cached --name-only | wc -l)" -eq 11
          git diff --cached --check
          git commit -m "feat: add in-memory Douyin stream resolver fallback"
          test -z "$(git status --short)"
          git push origin "HEAD:feature/p1a-single-room-media-foundation"
          git rev-parse HEAD
