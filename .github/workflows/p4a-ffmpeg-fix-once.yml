name: P4A apply retained FFmpeg fix once

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/p4a-ffmpeg-fix-once.yml

permissions:
  contents: write

concurrency:
  group: p4a-ffmpeg-fix-once
  cancel-in-progress: false

jobs:
  apply-fix:
    name: Apply verified retained FFmpeg fix
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'feature/p4a-release-packaging'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/p4a-release-packaging
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock
      - name: Verify exact staging head
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
          test "$(git rev-parse HEAD^)" = "ca668f3242caccd0e528d115c1399aa1de1dfbb8"
          test "$(git diff --name-only HEAD^ HEAD)" = ".github/workflows/p4a-ffmpeg-fix-once.yml"
      - name: Reconstruct and apply reviewed FFmpeg fix
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/git/blobs/f4973b3dea711654c270ecd6b35b1fd241464393" --jq .content \
            | tr -d '\n' | base64 --decode > "$RUNNER_TEMP/fix.patch.gz.b64"
          echo "2e30b59c87364710353a2ae3c3e1020e9225312e7c1b0e824a1ebd60bdf778b8  $RUNNER_TEMP/fix.patch.gz.b64" | sha256sum -c -
          test "$(stat -c %s "$RUNNER_TEMP/fix.patch.gz.b64")" = "6156"
          base64 --decode "$RUNNER_TEMP/fix.patch.gz.b64" > "$RUNNER_TEMP/fix.patch.gz"
          echo "62b7c6a4d5e69727ac1d80ce16412bf8358245bbe027cfb306b8324ad6e5ca76  $RUNNER_TEMP/fix.patch.gz" | sha256sum -c -
          test "$(stat -c %s "$RUNNER_TEMP/fix.patch.gz")" = "4615"
          gzip -dc "$RUNNER_TEMP/fix.patch.gz" > "$RUNNER_TEMP/fix.patch"
          echo "5e2cb61a255d30a76d0e6445c338f9415fecc5ddd9ad7e8d6babfd0346909ccb  $RUNNER_TEMP/fix.patch" | sha256sum -c -
          test "$(stat -c %s "$RUNNER_TEMP/fix.patch")" = "12502"
          ! grep -q '^diff --git a/.github/' "$RUNNER_TEMP/fix.patch"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git am "$RUNNER_TEMP/fix.patch"
          test "$(git log -1 --pretty=%s)" = "fix: pin retained Windows FFmpeg release"
          git show --check --oneline --no-renames HEAD
      - name: Run complete source validation
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check
          python tools/verify_repository_baseline.py
          python tools/verify_source.py
          python -m compileall -q app tests tools
          python -m ruff check --no-cache app tests tools
          python -m pytest -q -p no:cacheprovider --tb=short
          python tools/release_package.py validate-lock
          python tools/replay_recipient_fixture.py --quiet
          python tools/replay_recipient_fixture_to_db.py --output "$RUNNER_TEMP/recipient-db.json"
      - name: Push verified business fix
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(git status --short)"
          test -z "$(git diff HEAD^ HEAD --name-only | grep '^.github/' || true)"
          git push origin "HEAD:feature/p4a-release-packaging"
          git rev-parse HEAD
