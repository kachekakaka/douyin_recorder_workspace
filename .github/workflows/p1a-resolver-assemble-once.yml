name: P1A resolver assemble once

on:
  push:
    branches: [feature/p1a-single-room-media-foundation]
    paths:
      - .github/workflows/p1a-resolver-assemble-once.yml

permissions:
  contents: write

concurrency:
  group: p1a-resolver-assemble-once
  cancel-in-progress: false

jobs:
  assemble:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout exact triggering branch head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/p1a-single-room-media-foundation

      - name: Reconstruct and verify reviewed resolver milestone
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

          download_blob() {
            local sha="$1"
            gh api "repos/$GITHUB_REPOSITORY/git/blobs/$sha" --jq .content \
              | tr -d '\n' \
              | base64 --decode
          }

          payload_b64="$RUNNER_TEMP/p1a-resolver.b64"
          payload_tar="$RUNNER_TEMP/p1a-resolver.tar.gz"
          : > "$payload_b64"

          for sha in \
            5435f5b0f434fd069ed0adbf1063d554c8ed90de \
            8c3ee6d40896a1082d8f8ac8a3f13ec0f2bc3086 \
            8c1c4ee7efc865571869685a51b4e74df057d4d2 \
            46673b4b94e2fc23343c9a095680ebb9b8eca58d; do
            download_blob "$sha" >> "$payload_b64"
          done

          for sha in \
            cc8b3ceec5f5170cdae5cfc15e4aaa77205316f5 \
            f027f3a5e3e36a639fd68e8634896ff0cbeaa032 \
            457c6689876590cba3352fa98c72a9fc77d3f902 \
            51403dd2fb5655fe36abdbd833cc975863dd01b2 \
            9157cf4b8e5c2e63fd723157c41d96903cdb6437 \
            268c359e9b0eec2cc4c2e462c59af16c4442da2f \
            5cbefbb745f068afd5da63762ba682f7fe89e858 \
            5ec524bac98f03282463e2fcab380c16adf257b9 \
            2ec336f03459cb07f134d3e772008a72aed911ac \
            27438dfbc7e7bb9273c16bb7b773ffd97c68b8db \
            cd2172cd7b76ce1163682040f01bbf0396b197ce \
            763e49a68dec55ca5f84520fbd2aaf94f6c7a64d \
            8dccc23244ceb9152f8538a342b6277f3fca48f8 \
            71a98d205b8b54120d56237e8cb3ddc687a24811 \
            6042a452602f24847d6c3b0467fa453e1c9908b4 \
            27f626b8a6c6179464960440a7129877b6141815 \
            fa91e1b7246af7a154fe4689e92ef6f20fa890cd \
            ce1716ca35e213ca34e91d619d3d7739595923c1 \
            946b1920151d75554802eac2b55bbbac3e82dbc4 \
            a8cb6808209b112cf8db2e83e70ae105c86e16d5 \
            b1ccf853809aa2be8b185ac7f1bf168d5bbcf372 \
            4ac977bdffdb4241021b515168c71d36d3546a2c \
            ac11d3f9052f9edb4741b5c9dbcbe8f12a401e8f \
            9e28ce4f55ece152ea261d46e80ec931932de5f6 \
            91f97d41ddb104b65ed48790b02af5335f57418c \
            bdfd9b62d16142c8b7e543a7bc908bd3ef195355 \
            57998319d3037859f737f66c7b953f5824cd0a02 \
            e20de8ef7c6301a4277a5910f3d9993b77c62575 \
            dec9b5ec61fa6b8b04c038bb4f60adca598fabe8; do
            hex_file="$RUNNER_TEMP/$sha.hex"
            download_blob "$sha" > "$hex_file"
            xxd -r -p "$hex_file" >> "$payload_b64"
          done

          test "$(wc -c < "$payload_b64")" -eq 35200
          base64 --decode "$payload_b64" > "$payload_tar"
          echo "602d83b2b8305f22ce750082e3ab1fb26369209471fcd7520c1108d4d26cf62a  $payload_tar" \
            | sha256sum --check --strict

          PAYLOAD_TAR="$payload_tar" python - <<'PY'
          from __future__ import annotations

          import os
          import tarfile
          from pathlib import Path, PurePosixPath

          expected = {
              "app/douyin/live_page.py",
              "app/douyin/stream_resolver.py",
              "app/rooms/service.py",
              "app/state.py",
              "tests/integration/test_room_api.py",
              "tests/unit/test_douyin_network_probe.py",
              "tests/unit/test_live_page.py",
              "tests/unit/test_stream_resolver.py",
              "tools/douyin_network_probe.py",
              "tools/verify_source.py",
          }
          root = Path.cwd().resolve()
          archive = Path(os.environ["PAYLOAD_TAR"])
          with tarfile.open(archive, "r:gz") as bundle:
              members = bundle.getmembers()
              names = [member.name for member in members]
              if len(names) != len(expected) or set(names) != expected:
                  raise SystemExit(f"unexpected payload paths: {sorted(names)}")
              for member in members:
                  path = PurePosixPath(member.name)
                  if path.is_absolute() or ".." in path.parts or not member.isfile():
                      raise SystemExit(f"unsafe payload member: {member.name}")
                  target = (root / Path(*path.parts)).resolve()
                  if root not in target.parents:
                      raise SystemExit(f"payload escaped repository: {member.name}")
                  source = bundle.extractfile(member)
                  if source is None:
                      raise SystemExit(f"payload member unreadable: {member.name}")
                  data = source.read()
                  if len(data) != member.size:
                      raise SystemExit(f"payload member truncated: {member.name}")
                  target.parent.mkdir(parents=True, exist_ok=True)
                  target.write_bytes(data)
          PY

          verify_blob() {
            local expected="$1"
            local path="$2"
            local actual
            actual="$(git hash-object "$path")"
            test "$actual" = "$expected" || {
              echo "blob mismatch: $path expected=$expected actual=$actual" >&2
              exit 1
            }
          }

          verify_blob aef5352083b8d27857a2d8fd5b09296279b4389d app/douyin/live_page.py
          verify_blob 2cb690e73806a7da352840c73a0e007b1f76132c app/douyin/stream_resolver.py
          verify_blob 787ed309e1a0451b38b6c5e078921aaa23637c2b app/rooms/service.py
          verify_blob 28908ca5953563b24b6d4cab305839fcd526e91d app/state.py
          verify_blob d364ea017411aa6a82c411808c619a25f0428634 tests/integration/test_room_api.py
          verify_blob 2c46f4f03bb495afa9c4ba3489ca4a00e5f50671 tests/unit/test_douyin_network_probe.py
          verify_blob fb9dbb434e0d733fc1ad34694f3a88bc15f4ff9c tests/unit/test_live_page.py
          verify_blob 0a090fde2210270ee2b370ba78d9e8ae8d365422 tests/unit/test_stream_resolver.py
          verify_blob cff6add4eb96a81b80b04fffaf784f4d7e76ac7a tools/douyin_network_probe.py
          verify_blob a8c86d41bcf3295425a36a041134592feb6c7532 tools/verify_source.py

          rm .github/workflows/p1a-resolver-assemble-once.yml
          git diff --check

          python - <<'PY'
          import json
          from pathlib import Path

          contract = json.loads(Path("app/douyin/contracts/provisional_v1.json").read_text())
          if contract.get("live_verified") is not False:
              raise SystemExit("provisional contract must remain live_verified=false")
          expected = {
              ".github/workflows/p1a-resolver-assemble-once.yml",
              "app/douyin/live_page.py",
              "app/douyin/stream_resolver.py",
              "app/rooms/service.py",
              "app/state.py",
              "tests/integration/test_room_api.py",
              "tests/unit/test_douyin_network_probe.py",
              "tests/unit/test_live_page.py",
              "tests/unit/test_stream_resolver.py",
              "tools/douyin_network_probe.py",
              "tools/verify_source.py",
          }
          import subprocess

          actual = set(
              subprocess.check_output(["git", "diff", "--name-only"], text=True).splitlines()
          )
          if actual != expected:
              raise SystemExit(f"unexpected worktree diff: {sorted(actual)}")
          PY

      - name: Install locked development dependencies
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock

      - name: Run complete repository validation
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check
          python tools/verify_repository_baseline.py
          python tools/verify_source.py
          python -m compileall -q app tests tools
          python -m ruff check --no-cache app tests tools
          python -m pytest -q -p no:cacheprovider --tb=short
          python tools/replay_recipient_fixture.py --quiet
          find web -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Run FFmpeg Supervisor smoke
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          python tools/ffmpeg_supervisor_smoke.py \
            --duration 2 \
            --output-dir "$RUNNER_TEMP/p1a-resolver-smoke"

      - name: Commit and push verified resolver milestone
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- \
            .github/workflows/p1a-resolver-assemble-once.yml \
            app/douyin/live_page.py \
            app/douyin/stream_resolver.py \
            app/rooms/service.py \
            app/state.py \
            tests/integration/test_room_api.py \
            tests/unit/test_douyin_network_probe.py \
            tests/unit/test_live_page.py \
            tests/unit/test_stream_resolver.py \
            tools/douyin_network_probe.py \
            tools/verify_source.py
          test "$(git diff --cached --name-only | wc -l)" -eq 11
          git commit -m "feat: add in-memory Douyin stream resolver fallback"
          git push origin "HEAD:feature/p1a-single-room-media-foundation"
          git rev-parse HEAD
