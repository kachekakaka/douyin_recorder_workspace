name: P2A materialize RoomManager once

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/p2a-room-manager-materialize-once.yml

permissions:
  contents: write

concurrency:
  group: p2a-room-manager-materialize-once
  cancel-in-progress: false

jobs:
  materialize:
    name: Materialize verified P2A RoomManager
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'feature/p2a-multi-room-manager'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/p2a-multi-room-manager

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify exact staging state
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
          test "$(git status --porcelain)" = ""
          test "$(git rev-parse dd6a8b39659ab5d891cd03db1e31c727dec5a7ba^{tree})" = \
            "6c238d6bc3c52877a384bcbb33bd5d474645ab16"

      - name: Reconstruct verified P2A milestone patch
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          patch_b64="$RUNNER_TEMP/p2a.patch.gz.b64"
          patch_gz="$RUNNER_TEMP/p2a.patch.gz"
          patch="$RUNNER_TEMP/p2a.patch"
          : > "$patch_b64"
          for sha in \
            c6852d135af9146aab080e5ad5e70d68fd8474b1 \
            989dededb3b2597397aed602fae3ec3091876591 \
            416241aea70eff764d0b1b0fa51742321e6c8090 \
            9a45539709a7c3e941f4ab2b7d0efdcb111ec9d9 \
            c30d0e6113dc4c1d8aeec015002e89523a6694d2 \
            f1452b0f14b10c5dd3571062c2c4a97f01f8e6dd \
            8466fb2b923cc93bb355bdfa1c13f836b5d7842b \
            92fa427c4040fc8fab7acfc88c274afada196adc \
            603c5e24a5a21b39e926c8742e1b1a5eb0df0b81 \
            73ed82a17c606fba187e914411d7c590de2838a0 \
            8be0690a9d184d663b53484e5c8b6463db331e3a \
            a53dded8e664b9ea6592e35b19f788731586c3b9 \
            a34f9883370f7801c9f0b2f102fbd507572a5d83 \
            42452d82c0dbae0eafaac8b18af08fb9afc1477f \
            9626d34b4c0bcb9d03ad109737c817977132809b \
            4ccfd86e5e662d5334c0bdd11e479bd6e628cfbc \
            d38a10f718eee8c6d25918f182cd8ac998f28f15 \
            514b9024560eff9ae40e610bf6d18076358d700a
          do
            gh api "repos/$GITHUB_REPOSITORY/git/blobs/$sha" --jq .content \
              | tr -d '\n' | base64 --decode >> "$patch_b64"
          done
          echo "8071dbacfb54e9d07111f4440032c73bbb237d57a38486c31ac240faf571ce7a  $patch_b64" \
            | sha256sum -c -
          base64 --decode "$patch_b64" > "$patch_gz"
          echo "4f3b3b5e16f8ce4464e94eeb62a0420b7f20ab71fee7d32aef420c1688a079af  $patch_gz" \
            | sha256sum -c -
          test "$(stat -c %s "$patch_gz")" = "18884"
          gzip -dc "$patch_gz" > "$patch"
          echo "744dff17c0da524aca578ade63209e2fcee5627509f63be0f1a927193fac74c4  $patch" \
            | sha256sum -c -
          test "$(stat -c %s "$patch")" = "70133"

      - name: Apply four reviewed P2A milestones
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git am "$RUNNER_TEMP/p2a.patch"
          test "$(git log -4 --pretty=%s)" = "$(cat <<'EOF'
          docs: finalize P2A review and limitations
          feat: add multi-room status controls to web UI
          feat: reconcile room changes with automatic recording
          feat: add RoomManager worker lifecycle
          EOF
          )"

      - name: Remove temporary publisher state
        shell: bash
        run: |
          set -euo pipefail
          rm -rf \
            .github/p2a-payload \
            .github/p2a-payload-pointer.txt \
            .github/workflows/p2a-room-manager-materialize-once.yml
          git diff --check
          python - <<'PY'
          import json
          from pathlib import Path
          contract = json.loads(
              Path("app/douyin/contracts/provisional_v1.json").read_text(encoding="utf-8")
          )
          if contract.get("live_verified") is not False:
              raise SystemExit("live_verified must remain false")
          PY

      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check

      - name: Run complete P2A validation
        shell: bash
        run: |
          set -euo pipefail
          python tools/verify_repository_baseline.py
          python tools/verify_source.py
          python -m compileall -q app tests tools
          python -m ruff check --no-cache app tests tools
          python -m pytest -q -p no:cacheprovider --tb=short
          python tools/replay_recipient_fixture.py --quiet
          python tools/replay_recipient_fixture_to_db.py \
            --output "$RUNNER_TEMP/recipient-db.json"
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find web -type f -name '*.js' -print0)

      - name: Install FFmpeg and run inherited smoke tests
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          python tools/ffmpeg_supervisor_smoke.py \
            --duration 2 \
            --output-dir "$RUNNER_TEMP/p2a-supervisor-smoke"
          python tools/recording_session_smoke.py \
            --duration 2 \
            --output-dir "$RUNNER_TEMP/p2a-session-smoke"

      - name: Commit cleanup and push verified P2A tree
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          git commit -m "chore: remove temporary P2A materializer"
          test -z "$(git status --short)"
          git push origin "HEAD:feature/p2a-multi-room-manager"
          git rev-parse HEAD
