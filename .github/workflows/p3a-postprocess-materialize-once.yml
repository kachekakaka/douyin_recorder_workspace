name: P3A materialize postprocess jobs once

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/p3a-postprocess-materialize-once.yml

permissions:
  contents: write

concurrency:
  group: p3a-postprocess-materialize-once
  cancel-in-progress: false

jobs:
  materialize:
    name: Materialize verified P3A postprocess jobs
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'feature/p3a-postprocess-jobs'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/p3a-postprocess-jobs

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.lock

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify exact staging state
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
          test "$(git diff --name-only HEAD^ HEAD)" = ".github/workflows/p3a-postprocess-materialize-once.yml"
          test -f docs/P3A_IMPLEMENTATION_PLAN.md
          test -f .github/p3a-payload/02.txt
          test -f .github/p3a-payload/03.txt
          test "$(git rev-parse d492e0e881f4fe39692e1d0c979554f87e6a4b88^{tree})" = \
            "$(git rev-parse cc1a88de7ded9e613b721b540c6e0a5a5d680842^{tree})"

      - name: Reconstruct verified P3A milestone patch
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          patch_b64="$RUNNER_TEMP/p3a.patch.gz.b64"
          patch_gz="$RUNNER_TEMP/p3a.patch.gz"
          patch="$RUNNER_TEMP/p3a.patch"
          : > "$patch_b64"
          for sha in \
            0bbf69f5b50397efc4e524b7accf415a8f535cbe \
            101c3ed7f99ee9fbf75ba8ee79bcfbedbffa602d
          do
            gh api "repos/$GITHUB_REPOSITORY/git/blobs/$sha" --jq .content \
              | tr -d '\n' | base64 --decode >> "$patch_b64"
          done
          cat .github/p3a-payload/02.txt .github/p3a-payload/03.txt >> "$patch_b64"
          for sha in \
            e0c112b76e42dcbd9e169afc82b72d9af11c191d \
            652bee340c42a1a5eb2b252bdeaa6d0860d66105 \
            ab9502f57e138c25c67f73ad9b604dddf67a1d66 \
            b937e3d8cc9c1d3805e807d2ca1db9b9ba12ea61
          do
            gh api "repos/$GITHUB_REPOSITORY/git/blobs/$sha" --jq .content \
              | tr -d '\n' | base64 --decode >> "$patch_b64"
          done
          echo "d2b0c6ae47279056407f1c8d8e48a5f5375083bd8241c3c7c45a1b927d7b3b94  $patch_b64" \
            | sha256sum -c -
          test "$(stat -c %s "$patch_b64")" = "39208"
          base64 --decode "$patch_b64" > "$patch_gz"
          echo "147fbdac96d554926016028a03d1cdb0fee83727cec7710e08b0316c4d62ad2e  $patch_gz" \
            | sha256sum -c -
          test "$(stat -c %s "$patch_gz")" = "29406"
          gzip -dc "$patch_gz" > "$patch"
          echo "b1ee6fb18e04992f4508180f4aebd56619f209249b86a6dff11c78ed1356a67c  $patch" \
            | sha256sum -c -
          test "$(stat -c %s "$patch")" = "123427"

      - name: Apply five reviewed P3A milestones
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git am "$RUNNER_TEMP/p3a.patch"
          test "$(git log -5 --pretty=%s)" = "$(cat <<'EOF'
          docs: finalize P3A review and limitations
          test: verify P3A postprocess lifecycle
          feat: expose postprocess jobs in web UI
          feat: run persistent postprocess jobs
          feat: add postprocess schema v6
          EOF
          )"

      - name: Remove temporary publisher state
        shell: bash
        run: |
          set -euo pipefail
          rm -rf \
            .github/p3a-payload \
            .github/workflows/p3a-postprocess-materialize-once.yml
          python - <<'PY'
          import json
          from pathlib import Path
          contract = json.loads(
              Path("app/douyin/contracts/provisional_v1.json").read_text(encoding="utf-8")
          )
          if contract.get("live_verified") is not False:
              raise SystemExit("live_verified must remain false")
          PY
          git diff --check

      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock
          python -m pip check

      - name: Run complete P3A validation
        shell: bash
        run: |
          set -euo pipefail
          python tools/verify_repository_baseline.py
          python tools/verify_source.py
          python -m compileall -q app tests tools
          python -m ruff check --no-cache app tests tools
          python -m pytest -q -p no:cacheprovider --tb=short
          python tools/replay_recipient_fixture.py --quiet
          python tools/replay_recipient_fixture_to_db.py \
            --output "$RUNNER_TEMP/recipient-db.json"
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find web -type f -name '*.js' -print0)

      - name: Install FFmpeg and run all media smoke tests
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          python tools/ffmpeg_supervisor_smoke.py \
            --duration 2 \
            --output-dir "$RUNNER_TEMP/p3a-supervisor-smoke"
          python tools/recording_session_smoke.py \
            --duration 2 \
            --output-dir "$RUNNER_TEMP/p3a-session-smoke"
          python tools/postprocess_smoke.py \
            --duration 2 \
            --output-dir "$RUNNER_TEMP/p3a-postprocess-smoke"

      - name: Commit cleanup and push verified P3A tree
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          git commit -m "chore: remove temporary P3A materializer"
          test -z "$(git status --short)"
          git push origin "HEAD:feature/p3a-postprocess-jobs"
          git rev-parse HEAD
