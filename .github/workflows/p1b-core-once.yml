          from __future__ import annotations
          import asyncio
          from pathlib import Path
          from app.db import Database
          from app.recipients import DecodedRecipientEvent, RecipientRepository, RecipientService

          def test_recipient_projection_state_machine_and_privacy(tmp_path: Path) -> None:
              async def scenario() -> None:
                  db = Database(tmp_path / "recipient.db")
                  await db.initialize()
                  try:
                      assert await db.schema_version() == 5
                      service = RecipientService(RecipientRepository(db))
                      await service.start_session(room_key="room-a", session_id="session-a",
                          started_at_ms=1000, started_monotonic_ns=1_000_000,
                          runtime_instance_id="runtime-a", protocol_contract_sha256="0" * 64,
                          protocol_live_verified=False)
                      assert (await service.get_state(room_key="room-a")).state == "waiting"
                      a = DecodedRecipientEvent.synthetic(msg_id="1",
                          recipient_user_id="90071992547409931", received_at_ms=1100,
                          received_monotonic_ns=1_100_000, runtime_instance_id="runtime-a",
                          payload_tag="a")
                      await service.apply_event(room_key="room-a", event=a)
                      await service.apply_event(room_key="room-a", event=a)
                      assert (await service.list_events(room_key="room-a"))[0].duplicate_count == 1
                      b = DecodedRecipientEvent.synthetic(msg_id="2",
                          recipient_user_id="90071992547409932", received_at_ms=1200,
                          received_monotonic_ns=1_200_000, runtime_instance_id="runtime-a",
                          payload_tag="b")
                      await service.apply_event(room_key="room-a", event=b)
                      assert (await service.get_state(room_key="room-a")).recipient_user_id == "90071992547409932"
                      empty = DecodedRecipientEvent.synthetic(msg_id="3", recipient_user_id=None,
                          received_at_ms=1300, received_monotonic_ns=1_300_000,
                          runtime_instance_id="runtime-a", payload_tag="empty")
                      await service.apply_event(room_key="room-a", event=empty)
                      assert (await service.get_state(room_key="room-a")).reason == "empty_recipient"
                      await service.mark_disconnected(room_key="room-a", received_at_ms=1400,
                          received_monotonic_ns=1_400_000, runtime_instance_id="runtime-a")
                      assert (await service.mark_reconnected(room_key="room-a")).reason == "im_disconnected"
                      c = DecodedRecipientEvent.synthetic(msg_id="4",
                          recipient_user_id="90071992547409933", received_at_ms=1600,
                          received_monotonic_ns=1_600_000, runtime_instance_id="runtime-b",
                          payload_tag="c")
                      await service.apply_event(room_key="room-a", event=c)
                      late = DecodedRecipientEvent.synthetic(msg_id="5",
                          recipient_user_id="90071992547409934", received_at_ms=1250,
                          received_monotonic_ns=1_250_000, runtime_instance_id="runtime-a",
                          payload_tag="late")
                      assert (await service.apply_event(room_key="room-a", event=late)).is_late
                      assert (await service.get_state(room_key="room-a")).recipient_user_id == "90071992547409933"
                      rendered = repr([item.to_public_dict() for item in await service.list_events(room_key="room-a")])
                      assert "raw_payload" not in rendered and "synthetic" not in rendered
                      await service.end_session(room_key="room-a", ended_at_ms=1700,
                          ended_monotonic_ns=1_700_000,
                          ended_runtime_instance_id="runtime-b")
                      assert (await service.get_state(room_key="room-a")).state == "offline"
                  finally:
                      await db.close()
