          PY
      - name: Materialize repository, service, tests and replay
        shell: bash
        run: |
          cat > app/recipients/repository.py <<'PY'
          from __future__ import annotations

          import asyncio
          from collections.abc import AsyncIterator
          from contextlib import asynccontextmanager
          from pathlib import Path
          from typing import Any

          import aiosqlite

          from app.db import Database
          from app.recipients.models import (
              DecodedRecipientEvent,
              RecipientEventRecord,
              RecipientIntervalRecord,
              RecipientStateSnapshot,
          )


          class RecipientRepository:
              def __init__(self, database: Database) -> None:
                  self._database = database
                  self._lock = asyncio.Lock()

              def _database_path(self) -> Path:
                  for name in ("path", "database_path", "_path", "_database_path"):
                      value = getattr(self._database, name, None)
                      if value is not None:
                          return Path(value)
                  raise RuntimeError("database path is unavailable")

              @asynccontextmanager
              async def _transaction(self) -> AsyncIterator[aiosqlite.Connection]:
                  shared_lock = (
                      getattr(self._database, "_writer_lock", None)
                      or getattr(self._database, "_write_lock", None)
                      or self._lock
                  )
                  async with shared_lock:
                      db = await aiosqlite.connect(self._database_path())
                      db.row_factory = aiosqlite.Row
                      try:
                          await db.execute("PRAGMA foreign_keys = ON")
                          await db.execute("PRAGMA busy_timeout = 5000")
                          await db.execute("BEGIN IMMEDIATE")
                          yield db
                          await db.commit()
                      except BaseException:
                          await db.rollback()
                          raise
                      finally:
                          await db.close()

              async def start_session(self, *, room_key: str, session_id: str,
                                      started_at_ms: int, started_monotonic_ns: int,
                                      runtime_instance_id: str,
                                      protocol_contract_sha256: str,
                                      protocol_live_verified: bool = False) -> RecipientStateSnapshot:
                  async with self._transaction() as db:
                      await db.execute(
                          """INSERT INTO recipient_projection_sessions(
                          id, room_key, status, started_at_ms, runtime_instance_id,
                          started_monotonic_ns, protocol_contract_sha256, protocol_live_verified
                          ) VALUES (?, ?, 'active', ?, ?, ?, ?, ?)""",
                          (session_id, room_key, started_at_ms, runtime_instance_id,
                           started_monotonic_ns, protocol_contract_sha256,
                           int(protocol_live_verified)),
                      )
                      await db.execute(
                          """INSERT INTO recipient_projection_intervals(
                          session_id, state, reason, started_at_ms, runtime_instance_id,
                          started_monotonic_ns) VALUES (?, 'waiting',
                          'waiting_for_first_event', ?, ?, ?)""",
                          (session_id, started_at_ms, runtime_instance_id,
                           started_monotonic_ns),
                      )
                  return await self.get_state(room_key=room_key)

              async def _active_session(self, db: aiosqlite.Connection,
                                        room_key: str) -> aiosqlite.Row:
                  cursor = await db.execute(
                      """SELECT * FROM recipient_projection_sessions
                      WHERE room_key = ? AND status = 'active'
                      ORDER BY started_at_ms DESC LIMIT 1""", (room_key,))
                  row = await cursor.fetchone()
                  if row is None:
                      raise LookupError("active recipient session not found")
                  return row

              async def _open_interval(self, db: aiosqlite.Connection,
                                       session_id: str) -> aiosqlite.Row | None:
                  cursor = await db.execute(
                      """SELECT * FROM recipient_projection_intervals
                      WHERE session_id = ? AND ended_at_ms IS NULL
                      ORDER BY id DESC LIMIT 1""", (session_id,))
                  return await cursor.fetchone()

              async def _close_open_interval(self, db: aiosqlite.Connection, *,
                                             session_id: str, ended_at_ms: int,
                                             ended_monotonic_ns: int,
                                             ended_runtime_instance_id: str,
                                             end_event_id: int | None) -> None:
                  await db.execute(
                      """UPDATE recipient_projection_intervals SET ended_at_ms = ?,
                      ended_monotonic_ns = ?, ended_runtime_instance_id = ?,
                      end_event_id = ? WHERE session_id = ? AND ended_at_ms IS NULL""",
                      (ended_at_ms, ended_monotonic_ns, ended_runtime_instance_id,
                       end_event_id, session_id),
                  )

              async def apply_event(self, *, room_key: str,
                                    event: DecodedRecipientEvent) -> RecipientEventRecord:
                  async with self._transaction() as db:
                      session = await self._active_session(db, room_key)
                      session_id = str(session["id"])
                      cursor = await db.execute(
                          "SELECT * FROM recipient_projection_events WHERE session_id = ? AND dedup_key = ?",
                          (session_id, event.dedup_key),
                      )
                      duplicate = await cursor.fetchone()
                      if duplicate is not None:
                          await db.execute(
                              """UPDATE recipient_projection_events
                              SET duplicate_count = duplicate_count + 1,
                              last_received_at_ms = MAX(last_received_at_ms, ?)
                              WHERE id = ?""",
                              (event.received_at_ms, int(duplicate["id"])),
                          )
                          cursor = await db.execute(
                              "SELECT * FROM recipient_projection_events WHERE id = ?",
                              (int(duplicate["id"]),),
                          )
                          return self._event_record(await cursor.fetchone())
                      current = await self._open_interval(db, session_id)
                      is_late = current is not None and event.received_at_ms < int(current["started_at_ms"])
                      if (current is not None and not is_late
                              and str(current["runtime_instance_id"]) == event.runtime_instance_id
                              and current["started_monotonic_ns"] is not None):
                          is_late = event.received_monotonic_ns < int(current["started_monotonic_ns"])
                      cursor = await db.execute(
                          """INSERT INTO recipient_projection_events(
                          session_id, dedup_key, method, msg_id, envelope_msg_id,
                          server_create_time, server_time_unit, recipient_user_id,
                          recipient_user_open_id, recipient_key, change_reason_enum,
                          extra_json, raw_payload_json, payload_hash, payload_size,
                          unknown_fields_json, received_at_ms, received_monotonic_ns,
                          runtime_instance_id, is_late, first_received_at_ms,
                          last_received_at_ms) VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?,
                          ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)""",
                          (session_id, event.dedup_key, event.method, event.msg_id,
                           event.envelope_msg_id, event.server_create_time,
                           event.server_time_unit, event.recipient_user_id,
                           event.recipient_user_open_id, event.recipient_key,
                           event.change_reason_enum, event.extra_json,
                           event.raw_payload_json, event.payload_hash,
                           event.payload_size, event.unknown_fields_json,
                           event.received_at_ms, event.received_monotonic_ns,
                           event.runtime_instance_id, int(is_late),
                           event.received_at_ms, event.received_at_ms),
                      )
                      event_id = int(cursor.lastrowid)
                      if not is_late:
                          state = "active" if event.recipient_key else "unknown"
                          reason = None if event.recipient_key else "empty_recipient"
                          unchanged = (current is not None
                                       and str(current["state"]) == state
                                       and current["recipient_key"] == event.recipient_key
                                       and current["reason"] == reason)
                          if not unchanged:
                              await self._close_open_interval(
                                  db, session_id=session_id,
                                  ended_at_ms=event.received_at_ms,
                                  ended_monotonic_ns=event.received_monotonic_ns,
                                  ended_runtime_instance_id=event.runtime_instance_id,
                                  end_event_id=event_id)
                              await db.execute(
                                  """INSERT INTO recipient_projection_intervals(
                                  session_id, state, recipient_key, recipient_user_id,
                                  recipient_user_open_id, reason, started_at_ms,
                                  runtime_instance_id, started_monotonic_ns, start_event_id)
                                  VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?)""",
                                  (session_id, state, event.recipient_key,
                                   event.recipient_user_id,
                                   event.recipient_user_open_id, reason,
                                   event.received_at_ms, event.runtime_instance_id,
                                   event.received_monotonic_ns, event_id),
                              )
                      cursor = await db.execute(
                          "SELECT * FROM recipient_projection_events WHERE id = ?",
                          (event_id,),
                      )
                      return self._event_record(await cursor.fetchone())

              async def mark_disconnected(self, *, room_key: str,
                                          received_at_ms: int,
                                          received_monotonic_ns: int,
                                          runtime_instance_id: str) -> RecipientStateSnapshot:
                  async with self._transaction() as db:
                      session = await self._active_session(db, room_key)
                      session_id = str(session["id"])
                      current = await self._open_interval(db, session_id)
                      if current is None or not (str(current["state"]) == "unknown"
                              and str(current["reason"] or "") == "im_disconnected"):
                          await self._close_open_interval(
                              db, session_id=session_id, ended_at_ms=received_at_ms,
                              ended_monotonic_ns=received_monotonic_ns,
                              ended_runtime_instance_id=runtime_instance_id,
                              end_event_id=None)
                          await db.execute(
                              """INSERT INTO recipient_projection_intervals(
                              session_id, state, reason, started_at_ms,
                              runtime_instance_id, started_monotonic_ns)
                              VALUES (?, 'unknown', 'im_disconnected', ?, ?, ?)""",
                              (session_id, received_at_ms, runtime_instance_id,
                               received_monotonic_ns),
                          )
                  return await self.get_state(room_key=room_key)

              async def mark_reconnected(self, *, room_key: str) -> RecipientStateSnapshot:
                  return await self.get_state(room_key=room_key)

              async def end_session(self, *, room_key: str, ended_at_ms: int,
                                    ended_monotonic_ns: int,
                                    ended_runtime_instance_id: str) -> None:
                  async with self._transaction() as db:
                      session = await self._active_session(db, room_key)
                      session_id = str(session["id"])
                      await self._close_open_interval(
                          db, session_id=session_id, ended_at_ms=ended_at_ms,
                          ended_monotonic_ns=ended_monotonic_ns,
                          ended_runtime_instance_id=ended_runtime_instance_id,
                          end_event_id=None)
                      await db.execute(
                          """UPDATE recipient_projection_sessions SET status = 'ended',
                          ended_at_ms = ?, ended_monotonic_ns = ?,
                          ended_runtime_instance_id = ? WHERE id = ?""",
                          (ended_at_ms, ended_monotonic_ns,
                           ended_runtime_instance_id, session_id),
                      )

              async def get_state(self, *, room_key: str) -> RecipientStateSnapshot:
                  rows = await self._database.fetch_all(
                      """SELECT s.id AS session_id, i.*
                      FROM recipient_projection_sessions s
                      LEFT JOIN recipient_projection_intervals i
                      ON i.session_id = s.id AND i.ended_at_ms IS NULL
                      WHERE s.room_key = ? AND s.status = 'active'
                      ORDER BY s.started_at_ms DESC LIMIT 1""", (room_key,))
                  if not rows:
                      return RecipientStateSnapshot(room_key, None, "offline", None,
                                                    None, None, None, None, None)
                  row = rows[0]
                  return RecipientStateSnapshot(
                      room_key=room_key, session_id=str(row["session_id"]),
                      state=str(row["state"]), recipient_key=row["recipient_key"],
                      recipient_user_id=row["recipient_user_id"],
                      recipient_user_open_id=row["recipient_user_open_id"],
                      reason=row["reason"], started_at_ms=int(row["started_at_ms"]),
                      runtime_instance_id=str(row["runtime_instance_id"]))

              async def list_events(self, *, room_key: str, limit: int = 100,
                                    offset: int = 0) -> list[RecipientEventRecord]:
                  if not 1 <= limit <= 500 or offset < 0:
                      raise ValueError("invalid pagination")
                  rows = await self._database.fetch_all(
                      """SELECT e.* FROM recipient_projection_events e
                      JOIN recipient_projection_sessions s ON s.id = e.session_id
                      WHERE s.room_key = ? ORDER BY e.received_at_ms DESC, e.id DESC
                      LIMIT ? OFFSET ?""", (room_key, limit, offset))
                  return [self._event_record(row) for row in rows]

              async def list_intervals(self, *, room_key: str, limit: int = 100,
                                       offset: int = 0) -> list[RecipientIntervalRecord]:
                  if not 1 <= limit <= 500 or offset < 0:
                      raise ValueError("invalid pagination")
                  rows = await self._database.fetch_all(
                      """SELECT i.* FROM recipient_projection_intervals i
                      JOIN recipient_projection_sessions s ON s.id = i.session_id
                      WHERE s.room_key = ? ORDER BY i.started_at_ms DESC, i.id DESC
                      LIMIT ? OFFSET ?""", (room_key, limit, offset))
                  return [self._interval_record(row) for row in rows]

              @staticmethod
              def _event_record(row: Any) -> RecipientEventRecord:
                  return RecipientEventRecord(
                      id=int(row["id"]), session_id=str(row["session_id"]),
                      dedup_key=str(row["dedup_key"]), msg_id=row["msg_id"],
                      envelope_msg_id=row["envelope_msg_id"],
                      recipient_user_id=row["recipient_user_id"],
                      recipient_user_open_id=row["recipient_user_open_id"],
                      recipient_key=row["recipient_key"],
                      change_reason_enum=row["change_reason_enum"],
                      received_at_ms=int(row["received_at_ms"]),
                      received_monotonic_ns=int(row["received_monotonic_ns"]),
                      runtime_instance_id=str(row["runtime_instance_id"]),
                      payload_hash=str(row["payload_hash"]),
