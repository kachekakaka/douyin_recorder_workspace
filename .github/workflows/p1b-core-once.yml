          from __future__ import annotations
          import asyncio
          from app.recipients.models import DecodedRecipientEvent
          from app.recipients.repository import RecipientRepository

          class RecipientService:
              def __init__(self, repository: RecipientRepository) -> None:
                  self._repository = repository
                  self._locks: dict[str, asyncio.Lock] = {}
                  self._guard = asyncio.Lock()
              async def _lock(self, room_key: str) -> asyncio.Lock:
                  async with self._guard:
                      return self._locks.setdefault(room_key, asyncio.Lock())
              async def start_session(self, **kwargs: object):
                  lock = await self._lock(str(kwargs["room_key"]))
                  async with lock:
                      return await self._repository.start_session(**kwargs)
              async def apply_event(self, *, room_key: str, event: DecodedRecipientEvent):
                  lock = await self._lock(room_key)
                  async with lock:
                      return await self._repository.apply_event(room_key=room_key, event=event)
              async def mark_disconnected(self, **kwargs: object):
                  lock = await self._lock(str(kwargs["room_key"]))
                  async with lock:
                      return await self._repository.mark_disconnected(**kwargs)
              async def mark_reconnected(self, *, room_key: str):
                  lock = await self._lock(room_key)
                  async with lock:
                      return await self._repository.mark_reconnected(room_key=room_key)
              async def end_session(self, **kwargs: object) -> None:
                  lock = await self._lock(str(kwargs["room_key"]))
                  async with lock:
                      await self._repository.end_session(**kwargs)
              async def get_state(self, *, room_key: str):
                  return await self._repository.get_state(room_key=room_key)
              async def list_events(self, *, room_key: str, limit: int = 100, offset: int = 0):
                  return await self._repository.list_events(room_key=room_key, limit=limit, offset=offset)
              async def list_intervals(self, *, room_key: str, limit: int = 100, offset: int = 0):
                  return await self._repository.list_intervals(room_key=room_key, limit=limit, offset=offset)
