          cat > tools/replay_recipient_database.py <<'PY'
          from __future__ import annotations
          import argparse, asyncio, json, tempfile
          from pathlib import Path
          from app.db import Database
          from app.recipients import DecodedRecipientEvent, RecipientRepository, RecipientService

          async def replay(path: Path) -> dict[str, object]:
              db = Database(path)
              await db.initialize()
              try:
                  service = RecipientService(RecipientRepository(db))
                  await service.start_session(room_key="fixture-room", session_id="fixture-session",
                      started_at_ms=1000, started_monotonic_ns=1_000_000,
                      runtime_instance_id="fixture-runtime", protocol_contract_sha256="0" * 64,
                      protocol_live_verified=False)
                  for msg_id, uid, at in (("1", "90071992547409931", 1100),
                                          ("1", "90071992547409931", 1120),
                                          ("2", "90071992547409932", 1200),
                                          ("3", None, 1300)):
                      await service.apply_event(room_key="fixture-room",
                          event=DecodedRecipientEvent.synthetic(msg_id=msg_id,
                              recipient_user_id=uid, received_at_ms=at,
                              received_monotonic_ns=at * 1000,
                              runtime_instance_id="fixture-runtime",
                              payload_tag=f"event-{msg_id}"))
                  await service.mark_disconnected(room_key="fixture-room",
                      received_at_ms=1400, received_monotonic_ns=1_400_000,
                      runtime_instance_id="fixture-runtime")
                  return {"schema_version": await db.schema_version(),
                      "contract_live_verified": False,
                      "state": (await service.get_state(room_key="fixture-room")).to_public_dict(),
                      "events": [item.to_public_dict() for item in reversed(
                          await service.list_events(room_key="fixture-room"))],
                      "intervals": [item.to_public_dict() for item in reversed(
                          await service.list_intervals(room_key="fixture-room"))]}
              finally:
                  await db.close()

          async def main() -> int:
              parser = argparse.ArgumentParser()
              parser.add_argument("--output", type=Path)
              args = parser.parse_args()
              with tempfile.TemporaryDirectory(prefix="recipient-replay-") as directory:
                  result = await replay(Path(directory) / "replay.db")
              rendered = json.dumps(result, ensure_ascii=False, sort_keys=True, indent=2) + "\n"
              if args.output:
                  args.output.parent.mkdir(parents=True, exist_ok=True)
                  args.output.write_text(rendered, encoding="utf-8")
              else:
                  print(rendered, end="")
              return 0
          if __name__ == "__main__":
              raise SystemExit(asyncio.run(main()))
          PY
          cat > tests/unit/test_recipient_database_replay.py <<'PY'
          from __future__ import annotations
          import asyncio, json
          from pathlib import Path
          from tools.replay_recipient_database import replay

          def test_recipient_database_replay_is_deterministic(tmp_path: Path) -> None:
              async def scenario() -> None:
                  first = await replay(tmp_path / "first.db")
                  second = await replay(tmp_path / "second.db")
                  assert first == second
                  assert first["schema_version"] == 5
                  assert first["contract_live_verified"] is False
                  rendered = json.dumps(first, sort_keys=True)
                  assert "raw_payload" not in rendered
                  assert "synthetic" not in rendered
                  assert "90071992547409931" in rendered
              asyncio.run(scenario())
          PY
