name: P1B core publish once

on:
  push:
    branches: [feature/p1b-single-room-recipient-foundation]
    paths:
      - .github/workflows/p1b-core-once.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/p1b-single-room-recipient-foundation
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements/dev.lock
      - name: Materialize P1B transaction projection
        shell: bash
        run: |
          set -euo pipefail
          git pull --ff-only origin feature/p1b-single-room-recipient-foundation
          rm -f .github/p1b-payload-placeholder
          python - <<'PY'
          from pathlib import Path

          root = Path('.')
          package = root / 'app' / 'recipients'
          package.mkdir(parents=True, exist_ok=True)

          (package / '__init__.py').write_text('''from app.recipients.models import (\n    DecodedRecipientEvent,\n    RecipientEventRecord,\n    RecipientIntervalRecord,\n    RecipientStateSnapshot,\n)\nfrom app.recipients.repository import RecipientRepository\nfrom app.recipients.service import RecipientService\n\n__all__ = [\n    "DecodedRecipientEvent",\n    "RecipientEventRecord",\n    "RecipientIntervalRecord",\n    "RecipientRepository",\n    "RecipientService",\n    "RecipientStateSnapshot",\n]\n''', encoding='utf-8')

          (package / 'models.py').write_text(r'''from __future__ import annotations

import hashlib
import json
from dataclasses import dataclass
from typing import Any, Literal

TARGET_METHOD = "WebcastGroupLiveGiftRecipientRecommendMessage"
RecipientState = Literal["waiting", "active", "unknown", "offline"]


def _string_id(value: str | int | None) -> str | None:
    if value is None:
        return None
    rendered = str(value).strip()
    return rendered or None


def _safe_json_object(value: str | dict[str, Any] | None) -> str:
    if value is None:
        return "{}"
    parsed = json.loads(value) if isinstance(value, str) else value
    if not isinstance(parsed, dict):
        raise ValueError("recipient JSON audit fields must be objects")
    return json.dumps(parsed, ensure_ascii=False, sort_keys=True, separators=(",", ":"))


@dataclass(frozen=True, slots=True)
class DecodedRecipientEvent:
    method: str
    received_at_ms: int
    received_monotonic_ns: int
    runtime_instance_id: str
    payload_hash: str
    recipient_user_id: str | None = None
    recipient_user_open_id: str | None = None
    msg_id: str | None = None
    envelope_msg_id: str | None = None
    server_create_time: int | None = None
    server_time_unit: str | None = None
    change_reason_enum: int | None = None
    extra_json: str = "{}"
    raw_payload_json: str = "{}"
    payload_size: int = 0
    unknown_fields_json: str = "{}"

    def __post_init__(self) -> None:
        if self.method != TARGET_METHOD:
            raise ValueError("only the target recipient method is accepted")
        if self.received_at_ms < 0 or self.received_monotonic_ns < 0:
            raise ValueError("recipient event clocks must be non-negative")
        if not self.runtime_instance_id.strip():
            raise ValueError("runtime_instance_id is required")
        digest = self.payload_hash.casefold()
        if len(digest) != 64 or any(ch not in "0123456789abcdef" for ch in digest):
            raise ValueError("payload_hash must be SHA-256 hex")
        if self.payload_size < 0:
            raise ValueError("payload_size must be non-negative")
        object.__setattr__(self, "recipient_user_id", _string_id(self.recipient_user_id))
        object.__setattr__(self, "recipient_user_open_id", _string_id(self.recipient_user_open_id))
        object.__setattr__(self, "msg_id", _string_id(self.msg_id))
        object.__setattr__(self, "envelope_msg_id", _string_id(self.envelope_msg_id))
        object.__setattr__(self, "extra_json", _safe_json_object(self.extra_json))
        object.__setattr__(self, "raw_payload_json", _safe_json_object(self.raw_payload_json))
        object.__setattr__(self, "unknown_fields_json", _safe_json_object(self.unknown_fields_json))

    @property
    def recipient_key(self) -> str | None:
        if self.recipient_user_id and self.recipient_user_id != "0":
            return f"uid:{self.recipient_user_id}"
        if self.recipient_user_open_id:
            return f"openid:{self.recipient_user_open_id}"
        return None

    @property
    def dedup_key(self) -> str:
        if self.msg_id:
            return f"msg:{self.msg_id}"
        return f"hash:{self.payload_hash}:{self.received_at_ms // 1000}"

    @classmethod
    def synthetic(
        cls,
        *,
        msg_id: str,
        recipient_user_id: str | None,
        received_at_ms: int,
        received_monotonic_ns: int,
        runtime_instance_id: str,
        payload_tag: str,
    ) -> "DecodedRecipientEvent":
        payload = json.dumps({"synthetic": True, "tag": payload_tag}, sort_keys=True)
        return cls(
            method=TARGET_METHOD,
            msg_id=msg_id,
            envelope_msg_id=msg_id,
            recipient_user_id=recipient_user_id,
            received_at_ms=received_at_ms,
            received_monotonic_ns=received_monotonic_ns,
            runtime_instance_id=runtime_instance_id,
            payload_hash=hashlib.sha256(payload_tag.encode()).hexdigest(),
            payload_size=len(payload.encode()),
            raw_payload_json=payload,
        )


@dataclass(frozen=True, slots=True)
class RecipientEventRecord:
    id: int
    session_id: str
    dedup_key: str
    msg_id: str | None
    envelope_msg_id: str | None
    recipient_user_id: str | None
    recipient_user_open_id: str | None
    recipient_key: str | None
    change_reason_enum: int | None
    received_at_ms: int
    received_monotonic_ns: int
    runtime_instance_id: str
    payload_hash: str
    payload_size: int
    is_late: bool
    duplicate_count: int
    first_received_at_ms: int
    last_received_at_ms: int

    def to_public_dict(self) -> dict[str, object]:
        return {name: getattr(self, name) for name in self.__dataclass_fields__}


@dataclass(frozen=True, slots=True)
class RecipientIntervalRecord:
    id: int
    session_id: str
    state: RecipientState
    recipient_key: str | None
    recipient_user_id: str | None
    recipient_user_open_id: str | None
    reason: str | None
    started_at_ms: int
    ended_at_ms: int | None
    runtime_instance_id: str
    ended_runtime_instance_id: str | None
    started_monotonic_ns: int | None
    ended_monotonic_ns: int | None

    def to_public_dict(self) -> dict[str, object]:
        return {name: getattr(self, name) for name in self.__dataclass_fields__}


@dataclass(frozen=True, slots=True)
class RecipientStateSnapshot:
    room_key: str
    session_id: str | None
    state: RecipientState
    recipient_key: str | None
    recipient_user_id: str | None
    recipient_user_open_id: str | None
    reason: str | None
    started_at_ms: int | None
    runtime_instance_id: str | None

    def to_public_dict(self) -> dict[str, object]:
        return {name: getattr(self, name) for name in self.__dataclass_fields__}
''', encoding='utf-8')

          migration = root / 'app' / 'db' / 'migrations.py'
          text = migration.read_text(encoding='utf-8')
          if 'p1b_recipient_projection' not in text:
              block = r'''
    Migration(
