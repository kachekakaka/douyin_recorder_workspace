);
CREATE INDEX ix_recipient_projection_events_session_time
    ON recipient_projection_events(session_id, received_at_ms, id);
CREATE TABLE recipient_projection_intervals (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    session_id TEXT NOT NULL REFERENCES recipient_projection_sessions(id) ON DELETE RESTRICT,
    state TEXT NOT NULL CHECK(state IN ('waiting', 'active', 'unknown')),
    recipient_key TEXT,
    recipient_user_id TEXT,
    recipient_user_open_id TEXT,
    reason TEXT,
    started_at_ms INTEGER NOT NULL,
    ended_at_ms INTEGER,
    runtime_instance_id TEXT NOT NULL,
    ended_runtime_instance_id TEXT,
    started_monotonic_ns INTEGER,
    ended_monotonic_ns INTEGER,
    start_event_id INTEGER REFERENCES recipient_projection_events(id) ON DELETE RESTRICT,
    end_event_id INTEGER REFERENCES recipient_projection_events(id) ON DELETE RESTRICT
);
CREATE UNIQUE INDEX uq_recipient_projection_open_interval
    ON recipient_projection_intervals(session_id) WHERE ended_at_ms IS NULL;
CREATE INDEX ix_recipient_projection_intervals_session_time
    ON recipient_projection_intervals(session_id, started_at_ms, id);
""",
    ),
'''
              position = text.rfind('\n)')
              if position < 0:
                  raise SystemExit('migration tuple ending not found')
