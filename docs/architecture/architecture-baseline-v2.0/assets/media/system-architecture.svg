<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Python 单机多直播间录播总体架构</title>
  <desc id="desc">浏览器通过 REST 和 SSE 访问 FastAPI，RoomManager 管理多个 RoomWorker，每个在线房间独立监督 FFmpeg 和抖音 IM，数据写入 SQLite，媒体写入 records。</desc>
  <style>text{font-family:Arial,"Microsoft YaHei",sans-serif;fill:#172033}.title{font-size:30px;font-weight:700}.box{fill:#f7f9fc;stroke:#315f83;stroke-width:3;rx:16}.main{fill:#e8f2f8}.data{fill:#edf7f3;stroke:#2f7566}.label{font-size:22px;font-weight:700}.small{font-size:17px}.arrow{stroke:#315f83;stroke-width:3;fill:none;marker-end:url(#arrow)}</style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#315f83"/></marker></defs>
  <text x="600" y="48" text-anchor="middle" class="title">Python 单机多直播间录播总体架构</text>
  <rect x="430" y="78" width="340" height="82" class="box main"/><text x="600" y="112" text-anchor="middle" class="label">浏览器静态网页</text><text x="600" y="140" text-anchor="middle" class="small">HTML / CSS / ES Modules · REST + SSE</text>
  <rect x="350" y="205" width="500" height="105" class="box main"/><text x="600" y="244" text-anchor="middle" class="label">FastAPI / AppState</text><text x="600" y="275" text-anchor="middle" class="small">API · 认证 · SSE · RoomManager · JobRunner · DbWriter</text><path d="M600 160 V205" class="arrow"/>
  <rect x="55" y="365" width="320" height="170" class="box"/><text x="215" y="402" text-anchor="middle" class="label">RoomWorker A</text><text x="215" y="435" text-anchor="middle" class="small">LiveStatusChecker / StreamResolver</text><text x="215" y="465" text-anchor="middle" class="small">RecorderSupervisor → FFmpeg</text><text x="215" y="495" text-anchor="middle" class="small">DouyinImClient → RecipientStateMachine</text>
  <rect x="440" y="365" width="320" height="170" class="box"/><text x="600" y="402" text-anchor="middle" class="label">RoomWorker B</text><text x="600" y="435" text-anchor="middle" class="small">独立 Cookie / ttwid</text><text x="600" y="465" text-anchor="middle" class="small">独立 FFmpeg 与 IM 重连</text><text x="600" y="495" text-anchor="middle" class="small">成员切换不重启媒体</text>
  <rect x="825" y="365" width="320" height="170" class="box"/><text x="985" y="402" text-anchor="middle" class="label">RoomWorker N</text><text x="985" y="435" text-anchor="middle" class="small">单房间故障隔离</text><text x="985" y="465" text-anchor="middle" class="small">严格 Waiting / Active / Unknown</text><text x="985" y="495" text-anchor="middle" class="small">固定分片 · 直播后导出</text>
  <path d="M500 310 L215 365" class="arrow"/><path d="M600 310 V365" class="arrow"/><path d="M700 310 L985 365" class="arrow"/>
  <rect x="125" y="590" width="390" height="78" class="box data"/><text x="320" y="623" text-anchor="middle" class="label">SQLite WAL / userdata</text><text x="320" y="650" text-anchor="middle" class="small">房间 · 场次 · 事件 · 区间 · 任务 · 审计</text>
  <rect x="685" y="590" width="390" height="78" class="box data"/><text x="880" y="623" text-anchor="middle" class="label">records / 媒体文件</text><text x="880" y="650" text-anchor="middle" class="small">MKV 分片 · sidecar · clips · proxy</text><path d="M450 535 L360 590" class="arrow"/><path d="M750 535 L840 590" class="arrow"/>
</svg>
